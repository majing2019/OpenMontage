name: comic-story
version: "1.0"
description: >
  Comic story pipeline: transforms text snippets, jokes, or video references into a complete
  image-sequence comic for Douyin/Xiaohongshu. Produces PNG panels — not video — so users can
  post as image carousels or assemble into video themselves. Key differentiators: built-in
  character consistency (three-view anchoring), comic typography (text overlay with style rules),
  and personal IP outro.
category: comic
stability: beta
default_checkpoint_policy: guided

# Reference video input support (dual-path: transcript + visual analysis)
reference_input:
  supported: true
  analysis_depth: standard
  analysis_tools:
    - video_analyzer
    - transcript_fetcher
    - video_downloader
    - frame_sampler

orchestration:
  mode: executive-producer
  skill: pipelines/comic-story/executive-producer
  budget_default_usd: 1.00
  max_revisions_per_stage: 3
  max_send_backs: 3
  max_wall_time_minutes: 15

extensions:
  custom_scripts: true
  custom_playbooks: true
  custom_skills: true
  custom_tools: false

required_skills:
  - pipelines/comic-story/executive-producer
  - creative/character-consistency
  - creative/comic-typography
  - creative/personal-ip
  - meta/reviewer
  - meta/checkpoint-protocol

compatible_playbooks:
  recommended:
    - warm-illustration
    - clean-comic
  also_works:
    - cinematic-drama
    - watercolor-nostalgia
    - ink-dramatic
  custom_allowed: true

stages:
  - name: ideate
    skill: pipelines/comic-story/ideate-director
    produces:
      - story_seed
    tools_available:
      - story_factory
      - video_analyzer
      - transcript_fetcher
      - video_downloader
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - hook is non-empty and attention-grabbing
      - beats has complete 5-beat structure (minItems:5)
      - emotion_arc contains starts/peaks_at/ends
      - character_archetypes has at least 1 entry with visual_notes
      - suggested_style includes seedream_keywords
    success_criteria:
      - Schema-valid story_seed artifact
      - 3-5 candidate seeds generated for user selection
      - Each seed has complete 5-beat narrative structure
      - Reference video analysis produced if video input provided

  - name: style_pick
    skill: pipelines/comic-story/style-pick-director
    required_artifacts_in:
      - story_seed
    produces:
      - style_decision
    tools_available:
      - image_selector
      - video_analyzer
      - frame_sampler
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - style_lock has ≥ 3 keywords
      - image_prompt_prefix is non-empty
      - consistency_anchors is non-empty
      - reference_analysis is filled when reference mode used
      - video_analysis_brief consumed from EP_STATE when available
    success_criteria:
      - Schema-valid style_decision artifact
      - Style is locked and immutable for downstream stages
      - User confirmed style choice or reference extraction
      - Custom preset offered to save if reference mode used

  - name: shot_plan
    skill: pipelines/comic-story/shot-plan-director
    required_artifacts_in:
      - story_seed
      - style_decision
    produces:
      - shot_list
    tools_available: []
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Every panel has text_overlay or scene_texts (or both)
      - "scene_texts.method: ≤5 chars uses ai_draw, >5 chars uses post_only"
      - character_registry covers all appearing characters with anchor_description
      - scene_registry covers all distinct scenes
      - IP outro is planned
      - Reads character-consistency.md, comic-typography.md, personal-ip.md
    success_criteria:
      - Schema-valid shot_list artifact
      - character_registry and scene_registry are complete
      - All panels have narrative text assignments
      - IP outro panel is included

  - name: preview
    skill: pipelines/comic-story/preview-director
    required_artifacts_in:
      - shot_list
      - style_decision
    produces:
      - preview_manifest
    required_tools:
      - image_selector
    tools_available:
      - image_selector
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Every character_registry entry has an anchor image
      - Every scene_registry entry has a scene sample image
      - User confirmed characters look correct and scenes match
      - Character and scene descriptions are locked after approval
    success_criteria:
      - Schema-valid preview_manifest artifact
      - All character anchor images generated
      - All scene sample images generated
      - User approved all characters and scenes

  - name: generate
    skill: pipelines/comic-story/generate-director
    required_artifacts_in:
      - shot_list
      - preview_manifest
      - style_decision
    produces:
      - asset_manifest
    required_tools:
      - image_selector
    tools_available:
      - image_selector
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - All panel images exist and are readable
      - All images use the same style_lock keywords
      - Budget ≤ 90% of configured budget
      - Character anchors and scene templates from preview are used verbatim
    success_criteria:
      - Schema-valid asset_manifest artifact
      - All panel images generated with locked style
      - No character or scene description deviations from preview

  - name: caption
    skill: pipelines/comic-story/caption-director
    required_artifacts_in:
      - shot_list
      - asset_manifest
      - preview_manifest
    produces:
      - captioned_assets
    tools_available: []
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - All captioned images exist
      - Text contrast ratio ≥ 4.5:1
      - Text positions follow comic-typography.md rules
      - ai_draw text is clear; garbled text replaced with PIL overlay
      - Text does not obscure character facial expressions
    success_criteria:
      - Schema-valid captioned_assets artifact
      - All text overlays applied per shot_list specifications
      - Scene text fixups applied where ai_draw produced garbled text
      - Typography rules followed throughout

  - name: compose
    skill: pipelines/comic-story/compose-director
    required_artifacts_in:
      - captioned_assets
      - shot_list
    produces:
      - render_report
    tools_available: []
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - All captioned images are valid (exist, readable, no corruption)
      - All images have identical resolution
      - IP outro is the last panel
      - File naming follows panel_XX.png sequential order
      - Total panel count matches shot_list panel count
    success_criteria:
      - Schema-valid render_report artifact
      - Final image sequence output to projects/<name>/renders/panel_*.png
      - Resolution consistency verified across all panels
      - IP outro present in final panel
