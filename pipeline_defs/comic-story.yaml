name: comic-story
version: "1.0"
description: >
  Comic story pipeline: transforms text snippets, jokes, or video references into a complete
  comic video for Douyin/Xiaohongshu. Produces a vertical MP4 slideshow (720×1280, 9:16) with
  fade transitions between captioned panels, composed via FFmpeg xfade. No audio.
  Key differentiators: built-in character consistency (three-view anchoring), comic typography
  (text overlay with style rules), and personal IP outro.
category: comic
stability: beta
default_checkpoint_policy: guided

# Reference video input support (dual-path: transcript + visual analysis)
reference_input:
  supported: true
  analysis_depth: standard
  analysis_tools:
    - video_analyzer
    - transcript_fetcher
    - video_downloader
    - frame_sampler

orchestration:
  mode: executive-producer
  skill: pipelines/comic-story/executive-producer
  budget_default_usd: 1.00
  max_revisions_per_stage: 3
  max_send_backs: 3
  max_wall_time_minutes: 15

extensions:
  custom_scripts: true
  custom_playbooks: true
  custom_skills: true
  custom_tools: false

required_skills:
  - pipelines/comic-story/executive-producer
  - creative/character-consistency
  - creative/comic-typography
  - creative/personal-ip
  - meta/reviewer
  - meta/checkpoint-protocol

compatible_playbooks:
  recommended:
    - warm-illustration
    - warm-storybook
    - clean-comic
    - korean-webtoon
    - line-comic
    - classic-manga
  also_works:
    # 温度感 — 烟火气、治愈、怀旧、柔软
    - watercolor-nostalgia
    - pastel-chalk
    - embroidery
    - american-sunday-funnies
    - vintage-lianhuanhua
    # 精致感 — 潮流、文艺、动画感、清爽
    - cel-animation
    - ligne-claire
    - literary-illustration
    - vector-flat
    - anime-ghibli
    # 东方古典 — 中国风、日本美学
    - new-chinese-ink
    - gongbi
    - shan-shui
    - ink-dramatic
    - ukiyo-e
    - chinese-papercut
    - shadow-puppet
    # 戏剧感 — 反差、冲击、张力、暗调
    - cinematic-drama
    - charcoal
    - expressionist
    # 手工感 — 笔触、纹理、创作痕迹
    - doodle-journal
    - rough-print
    - collage-papercut
    - risograph
    - pencil-sketch
    - origami-paper
    - scratchboard
    # 氛围暗调 — 霓虹、未来、夜色
    - neon-noir
    - synthwave
    - vaporwave
    - glitch-art
    # 波普与设计 — 视觉冲击、风格化
    - pop-art
    - art-nouveau
    - duotone
    - constructivism
    - bauhaus
    - de-stijl
    - fauvism
    - stained-glass
    # 萌系与极简 — 可爱、幽默、自黑
    - chibi-q
    - stick-figure
    - pixel-art
    - low-poly
    # 艺术流派 — 从印象派到超现实
    - impressionism
    - van-gogh
    - surrealism
    - cubism
    # 朋克谱系 — 蒸汽、柴油、太阳
    - steam-punk
    - dieselpunk
    - solar-punk
    # 机甲与科技
    - mecha
    - blueprint
    # 民间与世界 — 异域风情
    - persian-miniature
    - madhubani
    - cave-art
    # 神秘与游戏
    - tarot
    - mosaic
    - shoujo-manga
    - street-art
    # 艺术流派补充
    - pointillism
    - pre-raphaelite
    - baroque
    - dada
    - op-art
    # 世界传统艺术
    - thangka
    - aboriginal-dot
    - celtic-illumination
    - batik
    # 漫画分支
    - underground-comix
    - superhero-comic
    - manhua
    # 纸艺手工补充
    - quilling
    - cross-stitch
    # 摄影与成像
    - cyanotype
    # 美学与空间
    - liminal-space
    - y2k
    - brutalism
    - dark-academia
    - wireframe
  custom_allowed: true

stages:
  - name: ideate
    skill: pipelines/comic-story/ideate-director
    produces:
      - story_seed
    tools_available:
      - story_factory
      - video_analyzer
      - transcript_fetcher
      - video_downloader
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - hook is non-empty and attention-grabbing
      - beats has complete 5-beat structure (minItems:5)
      - emotion_arc contains starts/peaks_at/ends
      - character_archetypes has at least 1 entry with visual_notes
      - suggested_style includes seedream_keywords
    success_criteria:
      - Schema-valid story_seed artifact
      - 3-5 candidate seeds generated for user selection
      - Each seed has complete 5-beat narrative structure
      - Reference video analysis produced if video input provided

  - name: style_pick
    skill: pipelines/comic-story/style-pick-director
    required_artifacts_in:
      - story_seed
    produces:
      - style_decision
    tools_available:
      - image_selector
      - video_analyzer
      - frame_sampler
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - style_lock has ≥ 3 keywords
      - image_prompt_prefix is non-empty
      - consistency_anchors is non-empty
      - reference_analysis is filled when reference mode used
      - video_analysis_brief consumed from EP_STATE when available
    success_criteria:
      - Schema-valid style_decision artifact
      - Style is locked and immutable for downstream stages
      - User confirmed style choice or reference extraction
      - Custom preset offered to save if reference mode used

  - name: shot_plan
    skill: pipelines/comic-story/shot-plan-director
    required_artifacts_in:
      - story_seed
      - style_decision
    produces:
      - shot_list
    tools_available: []
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Every panel has text_overlay or scene_texts (or both)
      - "scene_texts.method: ≤5 chars uses ai_draw, >5 chars uses post_only"
      - character_registry covers all appearing characters with anchor_description
      - scene_registry covers all distinct scenes
      - IP outro is planned
      - Reads character-consistency.md, comic-typography.md, personal-ip.md
    success_criteria:
      - Schema-valid shot_list artifact
      - character_registry and scene_registry are complete
      - All panels have narrative text assignments
      - IP outro panel is included

  - name: preview
    skill: pipelines/comic-story/preview-director
    required_artifacts_in:
      - shot_list
      - style_decision
    produces:
      - preview_manifest
    required_tools:
      - image_selector
    tools_available:
      - image_selector
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Every character_registry entry has an anchor image
      - Every character has expression headshots for ALL unique emotions from shot_list
      - Expression headshots are close-up face shots (大头照), not full-body
      - Composite reference images generated (headshot + full-body side-by-side) for each emotion
      - Every scene_registry entry has a scene sample image
      - User confirmed characters look correct, expressions are natural, scenes match
      - Character and scene descriptions are locked after approval
    success_criteria:
      - Schema-valid preview_manifest artifact
      - All character anchor images generated
      - All expression headshots generated (one per unique emotion per character)
      - All composite reference images generated (headshot + full-body side-by-side)
      - All scene sample images generated
      - User approved all characters, expressions, and scenes

  - name: generate
    skill: pipelines/comic-story/generate-director
    required_artifacts_in:
      - shot_list
      - preview_manifest
      - style_decision
    produces:
      - asset_manifest
    required_tools:
      - image_selector
    tools_available:
      - image_selector
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - All panel images exist and are readable
      - All images use the same style_lock keywords
      - Budget ≤ 90% of configured budget
      - Composite reference images (headshot + full-body) used as reference_image for character panels
      - Character anchors and scene templates from preview are used verbatim
    success_criteria:
      - Schema-valid asset_manifest artifact
      - All panel images generated with locked style
      - No character or scene description deviations from preview
      - Composite reference match rate recorded in asset_manifest

  - name: caption
    skill: pipelines/comic-story/caption-director
    required_artifacts_in:
      - shot_list
      - asset_manifest
      - preview_manifest
    produces:
      - captioned_assets
    tools_available: []
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - All captioned images exist
      - Text contrast ratio ≥ 4.5:1
      - Text positions follow comic-typography.md rules
      - ai_draw text is clear; garbled text replaced with PIL overlay
      - Text does not obscure character facial expressions
    success_criteria:
      - Schema-valid captioned_assets artifact
      - All text overlays applied per shot_list specifications
      - Scene text fixups applied where ai_draw produced garbled text
      - Typography rules followed throughout

  - name: compose
    skill: pipelines/comic-story/compose-director
    required_artifacts_in:
      - captioned_assets
      - shot_list
    produces:
      - render_report
    tools_available:
      - ffmpeg
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - All captioned images are valid (exist, readable, no corruption)
      - All images resized to 720×1280 consistently
      - FFmpeg xfade video composition executed without errors
      - "Output final.mp4: h264 codec, 720×1280 resolution, 30fps"
      - Video duration within ±1s of expected
      - IP outro is the last panel
      - Total panel count matches shot_list panel count
    success_criteria:
      - Schema-valid render_report artifact
      - Final video output to projects/<name>/renders/final.mp4
      - Video is h264, 720×1280, 30fps, with fade transitions
      - Resolution consistency verified across all panels
      - IP outro present in final panel
