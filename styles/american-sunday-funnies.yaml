identity:
  name: "American Sunday Funnies"
  category: comic
  mood: witty, nostalgic, heartwarming, clever
  pace: moderate
  best_for: "温馨段子、家庭趣事、机智对白、报纸漫画感、老少皆宜"

visual_language:
  color_palette:
    primary: ["#FFD5A5", "#FFE4C4"]
    accent: ["#E85D5D", "#5BA4CF", "#F5C842", "#6BA368"]
    background: "#FFF8F0"
    text: "#2A1F14"
    muted: "#D0C0B0"
  composition: 四格漫画式分格，柔和暖色底色，人物造型圆润可爱，对话气泡充足
  texture: 钢笔水彩上色，柔和圆润的线条，像 Calvin & Hobbes 的温暖报纸漫画风

style_lock:
  - "美式星期天漫画"
  - "钢笔水彩上色"
  - "柔和圆润线条"
  - "四格报纸漫画"
  - "暖色底色"
  - "对话气泡"
  - "人物造型可爱"
  - "轻松温馨氛围"
  - "Calvin-Hobbes风格"

typography:
  headings:
    font: Noto Sans SC
    weight: 600
    line_height: 1.2
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#2A1F14"
    stroke: "#FFF8F0"
    stroke_width: 3
    band_color: "rgba(255, 248, 240, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 7
    transition_duration_seconds: 0.5

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.5s"
  padding_color: "#FFF8F0"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "美式星期天漫画, 钢笔水彩上色, 柔和圆润线条, 四格报纸漫画, 暖色底色, 对话气泡, 人物造型可爱, 轻松温馨氛围, Calvin-Hobbes风格"
  image_negative_prompt: "photorealistic, 3D render, photograph, dark, gritty, sharp angles, aggressive, anime, manga"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "线条必须柔和圆润，不可尖锐"
  - "底色必须暖色系"
  - "文字叠加不得遮挡角色面部表情"
