identity:
  name: "Art Nouveau"
  category: comic
  mood: elegant, decorative, dreamy, romantic
  pace: slow
  best_for: "浪漫故事、女性向、文艺叙事、梦幻场景、唯美表达"

visual_language:
  color_palette:
    primary: ["#C9A87C", "#B8956A", "#E8D5B7"]
    accent: ["#8FBC8F", "#D4A0C0", "#C17F59"]
    background: "#F5F0E6"
    text: "#3C2A1E"
    muted: "#D4C4B0"
  composition: 优雅曲线边框，藤蔓花卉纹样装饰画面边缘，人物修长，装饰性留白
  texture: 流动藤蔓线条，花卉几何纹样，彩色玻璃窗般的分割色块，像穆夏海报

style_lock:
  - "新艺术运动风格"
  - "穆夏插画风"
  - "流动藤蔓曲线"
  - "花卉几何纹样"
  - "装饰性边框"
  - "人物修长优雅"
  - "彩色玻璃分割"
  - "唯美浪漫质感"
  - "世纪末装饰艺术"

typography:
  headings:
    font: Noto Serif SC
    weight: 600
    line_height: 1.3
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.6
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#3C2A1E"
    stroke: "#F5F0E6"
    stroke_width: 3
    band_color: "rgba(245, 240, 230, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: gentle-fade
  pacing_rules:
    min_scene_hold_seconds: 4
    max_scene_hold_seconds: 8
    transition_duration_seconds: 0.8

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.8s"
  padding_color: "#F5F0E6"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "新艺术运动风格, 穆夏插画风, 流动藤蔓曲线, 花卉几何纹样, 装饰性边框, 人物修长优雅, 彩色玻璃分割, 唯美浪漫质感"
  image_negative_prompt: "photorealistic, 3D render, photograph, rough, angular, minimal, plain, simple, modern corporate"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "画面必须有装饰性藤蔓花卉元素"
  - "线条必须是优雅曲线"
  - "文字叠加不得遮挡角色面部表情"
