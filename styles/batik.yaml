identity:
  name: "Batik"
  category: comic
  mood: earthy, patterned, handmade, cultural
  pace: slow
  best_for: "热带叙事、传统工艺、蜡染美学、民族风情、手工温度"

visual_language:
  color_palette:
    primary: ["#8B4513", "#3B5998", "#C43A31", "#D4A020"]
    accent: ["#FF8C00", "#2E8B57"]
    background: "#F5EDD8"
    text: "#3C2A1E"
    muted: "#C5B898"
  composition: 蜡防染的裂纹纹理，传统纹样布满画面，靛蓝赭石等天然染料色
  texture: 蜡染冰裂纹细密纹路，天然染料在棉布上的渗透，手工描画的纹样

style_lock:
  - "蜡染风格"
  - "冰裂纹细密纹路"
  - "天然染料棉布"
  - "蜡防染纹理"
  - "靛蓝赭石配色"
  - "传统纹样图案"
  - "手工描画质感"
  - "印尼Batik美学"
  - "热带民族风情"

typography:
  headings:
    font: Noto Serif SC
    weight: 600
    line_height: 1.2
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#3C2A1E"
    stroke: "#F5EDD8"
    stroke_width: 3
    band_color: "rgba(245, 237, 216, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 8
    transition_duration_seconds: 0.6

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.6s"
  padding_color: "#F5EDD8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "蜡染Batik风格, 冰裂纹细密纹路, 天然染料在棉布上渗透, 蜡防染纹理, 靛蓝赭石天然配色, 传统纹样图案, 手工描画质感"
  image_negative_prompt: "photorealistic, digital, smooth, synthetic, modern, clean, minimal"
  consistency_anchors:
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有冰裂纹或蜡染纹理"
  - "色彩必须是天然染料色系"
  - "文字叠加不得遮挡角色面部表情"
