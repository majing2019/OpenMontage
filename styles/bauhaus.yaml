identity:
  name: "Bauhaus"
  category: comic
  mood: functional, geometric, rational, design-forward
  pace: fast
  best_for: "设计哲学、功能美学、理性叙事、极简几何、现代主义审美"

visual_language:
  color_palette:
    primary: ["#E85D3A", "#3BA3D0", "#F5C842"]
    accent: ["#000000", "#FFFFFF"]
    background: "#F5F0E8"
    text: "#1A1A1A"
    muted: "#C0C0C0"
  composition: 圆形三角方形基础几何构成一切，非对称平衡，功能决定形式
  texture: 包豪斯几何纯粹感，原色红蓝黄加黑白，无装饰的诚实材料，理性排版

style_lock:
  - "包豪斯风格"
  - "基础几何圆形三角方形"
  - "红蓝黄原色"
  - "非对称平衡"
  - "无装饰诚实"
  - "功能决定形式"
  - "理性排版"
  - "现代主义美学"
  - "几何纯粹感"

typography:
  headings:
    font: Noto Sans SC
    weight: 700
    line_height: 1.1
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.4
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#1A1A1A"
    stroke: "#F5F0E8"
    stroke_width: 3
    band_color: "rgba(245, 240, 232, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - cut
  animation_style: cut
  pacing_rules:
    min_scene_hold_seconds: 2
    max_scene_hold_seconds: 6
    transition_duration_seconds: 0.3

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.3s"
  padding_color: "#F5F0E8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "包豪斯风格, 基础几何圆形三角方形, 红蓝黄原色, 非对称平衡构图, 无装饰诚实的现代主义美学"
  image_negative_prompt: "ornate, decorative, baroque, organic, natural, curved, photorealistic, traditional"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须用基础几何形状构成"
  - "配色必须红蓝黄加黑白为主"
  - "文字叠加不得遮挡角色面部表情"
