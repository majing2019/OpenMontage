identity:
  name: "Brutalism"
  category: comic
  mood: monumental, raw, imposing, honest
  pace: slow
  best_for: "体制叙事、城市孤独、宏大与渺小、粗野美学、反精致"

visual_language:
  color_palette:
    primary: ["#808080", "#606060", "#A0A0A0"]
    accent: ["#C43A31", "#2A2A2A"]
    background: "#D0D0D0"
    text: "#2A2A2A"
    muted: "#B0B0B0"
  composition: 巨型混凝土几何体占据画面，模板痕迹和螺栓孔可见，人在巨构下渺小
  texture: 粗糙的混凝土表面，木模板留下的纹理，结构接缝和螺栓孔

style_lock:
  - "粗野主义建筑风格"
  - "巨型混凝土几何体"
  - "模板痕迹螺栓孔"
  - "粗糙混凝土表面"
  - "人在巨构下渺小"
  - "结构接缝美学"
  - "灰色混凝土色调"
  - "反精致诚实"
  - "纪念碑式构图"

typography:
  headings:
    font: Noto Sans SC
    weight: 900
    line_height: 1.1
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.4
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#2A2A2A"
    stroke: "#D0D0D0"
    stroke_width: 3
    band_color: "rgba(208, 208, 208, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - cut
  animation_style: cut
  pacing_rules:
    min_scene_hold_seconds: 4
    max_scene_hold_seconds: 8
    transition_duration_seconds: 0.6

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.6s"
  padding_color: "#D0D0D0"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "粗野主义建筑风格, 巨型混凝土几何体, 模板痕迹螺栓孔, 粗糙混凝土表面纹理, 灰色混凝土色调, 反精致诚实美学"
  image_negative_prompt: "colorful, ornate, delicate, natural wood, glass curtain wall, polished, elegant, photorealistic"
  consistency_anchors:
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有混凝土表面纹理"
  - "必须有巨型几何体构图"
  - "文字叠加不得遮挡角色面部表情"
