identity:
  name: "Cave Art"
  category: comic
  mood: primitive, raw, ancient, universal
  pace: slow
  best_for: "寓言故事、人类学梗、原始叙事、永恒主题、创世神话感"

visual_language:
  color_palette:
    primary: ["#8B4513", "#A0522D"]
    accent: ["#2F1F0E", "#654321", "#D2691E"]
    background: "#E8D5B7"
    text: "#2F1F0E"
    muted: "#C4A882"
  composition: 岩壁上赭石和碳黑勾勒的人物和动物，重叠的手印，史前洞穴壁画感
  texture: 粗糙岩壁表面，矿物颜料渗入石纹，赭石碳黑单色调，手掌印和抽象符号

style_lock:
  - "岩画风格"
  - "粗糙岩壁表面"
  - "赭石碳黑颜料"
  - "矿物渗入石纹"
  - "手掌印符号"
  - "史前洞穴壁画"
  - "抽象简朴造型"
  - "原始生命力"
  - "永恒叙事感"

typography:
  headings:
    font: Noto Serif SC
    weight: 700
    line_height: 1.2
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#2F1F0E"
    stroke: "#E8D5B7"
    stroke_width: 3
    band_color: "rgba(232, 213, 183, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: gentle-fade
  pacing_rules:
    min_scene_hold_seconds: 4
    max_scene_hold_seconds: 9
    transition_duration_seconds: 0.8

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.8s"
  padding_color: "#E8D5B7"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "岩画风格, 粗糙岩壁表面, 赭石碳黑矿物颜料, 矿物渗入石纹, 手掌印符号, 史前洞穴壁画, 抽象简朴造型, 原始生命力"
  image_negative_prompt: "photorealistic, 3D render, modern, digital, polished, clean, realistic anatomy, perspective"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有岩壁表面纹理"
  - "色彩必须赭石碳黑单色系"
  - "文字叠加不得遮挡角色面部表情"
