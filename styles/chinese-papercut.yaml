identity:
  name: "Chinese Papercut"
  category: comic
  mood: festive, folk, auspicious, intricate
  pace: moderate
  best_for: "民俗故事、节庆内容、吉祥叙事、民间传说、中国风剪纸"

visual_language:
  color_palette:
    primary: ["#CC0000", "#990000"]
    accent: ["#FF3300"]
    background: "#FFF8F0"
    text: "#CC0000"
    muted: "#FFCCCC"
  composition: 红色剪纸镂空艺术，对称构图，阳刻阴刻结合，万物相连不断
  texture: 红纸镂空透光，剪纸锯齿纹和月牙纹，纸纤维毛边，中国民间艺术

style_lock:
  - "中国剪纸风格"
  - "红色镂空透光"
  - "对称剪纸构图"
  - "锯齿纹月牙纹"
  - "阳刻阴刻结合"
  - "万物相连不断"
  - "中国民间艺术"
  - "吉祥图案"
  - "窗花剪纸"

typography:
  headings:
    font: Noto Serif SC
    weight: 900
    line_height: 1.15
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#CC0000"
    stroke: "#FFF8F0"
    stroke_width: 3
    band_color: "rgba(255, 248, 240, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 7
    transition_duration_seconds: 0.5

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.5s"
  padding_color: "#FFF8F0"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "中国剪纸风格, 红色镂空透光, 对称剪纸构图, 锯齿纹月牙纹, 阳刻阴刻结合, 万物相连不断, 中国民间艺术窗花"
  image_negative_prompt: "3D, shading, gradient, realistic, perspective, multicolor, blue, green, white background only, smooth edges"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须是红色剪纸镂空感"
  - "必须有锯齿纹或月牙纹等剪纸纹理"
  - "文字叠加不得遮挡角色面部表情"
