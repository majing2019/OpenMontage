identity:
  name: "Classic Manga"
  category: comic
  mood: dramatic, expressive, energetic, punchy
  pace: fast
  best_for: "搞笑段子、夸张表情、戏剧反转、热血吐槽、表情包式表达"

visual_language:
  color_palette:
    primary: ["#000000", "#1A1A1A"]
    accent: ["#000000"]
    background: "#FFFFFF"
    text: "#000000"
    muted: "#999999"
  composition: 钢笔黑线加网点灰阶，角色占据画面主体，速度线、集中线、效果字融入画面
  texture: 钢笔尖细黑线，网点纸灰阶纹理，漫画效果线，集中线，像《孤独的美食家》片头

style_lock:
  - "日系经典漫画"
  - "钢笔黑线网点灰阶"
  - "速度线和集中线"
  - "夸张漫画表情"
  - "黑白高对比度"
  - "效果字融入画面"
  - "戏剧性镜头感"
  - "漫画符号和拟声词"
  - "经典日漫分镜"

typography:
  headings:
    font: Noto Sans SC
    weight: 900
    line_height: 1.1
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.4
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#FFFFFF"
    stroke: "#000000"
    stroke_width: 2
    band_color: "rgba(0, 0, 0, 0.70)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方，无间隙"

motion:
  transitions:
    - cut
    - xfade_fade
  animation_style: snappy-cut
  pacing_rules:
    min_scene_hold_seconds: 2
    max_scene_hold_seconds: 5
    transition_duration_seconds: 0.3

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280 → 整体占满画布"
  transition: "xfade=fade, duration=0.3s"
  padding_color: "#FFFFFF"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "日系经典漫画, 钢笔黑线, 网点纸灰阶, 速度线和集中线, 夸张漫画表情, 黑白高对比度, 效果字融入画面, 戏剧性镜头感, 漫画符号和拟声词, 经典日漫分镜"
  image_negative_prompt: "color, colored, painting, watercolor, oil painting, photorealistic, 3D render, photograph, gradient shading, soft shadows"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "场景模板前缀从 scene_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有角色在所有画面中必须使用完全相同的角色锚定描述"
  - "所有画面必须包含 style_lock 关键词"
  - "场景模板前缀在相同场景的所有画面中必须字面一致"
  - "文字叠加不得遮挡角色面部表情"
  - "画面内文字（scene_texts）≤5字用 ai_draw，>5字用 post_only"
  - "网点灰阶必须可见，不可纯黑白无纹理"
  - "画面必须有漫画效果线或速度线元素"
