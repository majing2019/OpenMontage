identity:
  name: "Constructivism"
  category: comic
  mood: revolutionary, bold, propagandistic, geometric
  pace: fast
  best_for: "态度宣言、革命性表达、社会批判、力量感叙事、苏联海报风"

visual_language:
  color_palette:
    primary: ["#CC0000", "#000000"]
    accent: ["#FFCC00", "#FFFFFF"]
    background: "#F0E8D8"
    text: "#CC0000"
    muted: "#999999"
  composition: 大胆的斜线构图，红黑白色块碰撞，几何图形穿插，像苏联构成主义海报
  texture: 粗粝的印刷质感，红黑白的强对比，几何图形切割画面，工业感字体

style_lock:
  - "构成主义风格"
  - "红黑白色块碰撞"
  - "大胆斜线构图"
  - "几何图形切割"
  - "苏联海报美学"
  - "工业感字体"
  - "粗粝印刷质感"
  - "革命性视觉"
  - "力量感几何"

typography:
  headings:
    font: Noto Sans SC
    weight: 900
    line_height: 1.0
  body:
    font: Noto Sans SC
    weight: 700
    line_height: 1.3
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#CC0000"
    stroke: "#F0E8D8"
    stroke_width: 3
    band_color: "rgba(240, 232, 216, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - cut
  animation_style: cut
  pacing_rules:
    min_scene_hold_seconds: 2
    max_scene_hold_seconds: 5
    transition_duration_seconds: 0.3

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.3s"
  padding_color: "#F0E8D8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "构成主义风格, 红黑白色块碰撞, 大胆斜线构图, 几何图形切割画面, 苏联海报美学, 粗粝印刷质感, 革命性视觉"
  image_negative_prompt: "photorealistic, soft, pastel, organic, natural, curved, delicate, subtle, gradient"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须红黑白为主色调"
  - "必须有几何图形切割构图"
  - "文字叠加不得遮挡角色面部表情"
