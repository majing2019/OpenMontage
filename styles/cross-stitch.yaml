identity:
  name: "Cross Stitch"
  category: comic
  mood: cozy, crafty, pixel-like, homey
  pace: slow
  best_for: "温馨手作、像素替代选择、十字绣美学、手工艺叙事、奶奶的温度"

visual_language:
  color_palette:
    primary: ["#C43A31", "#3B5998", "#2E8B57", "#F5A623"]
    accent: ["#FFD700", "#FFB7C5"]
    background: "#F5EDD8"
    text: "#4A3A2A"
    muted: "#C5B898"
  composition: 十字交叉绣线在亚麻布网格上组成画面，每个像素是一个×
  texture: 亚麻布经纬网格，绣线交叉的×形，绣线微微凸起的光泽感

style_lock:
  - "十字绣风格"
  - "绣线交叉纹理"
  - "亚麻布经纬网格"
  - "每个像素是交叉"
  - "绣线微微凸起"
  - "手工刺绣温度"
  - "网格像素美学"
  - "温馨手作感"
  - "奶奶的温度"

typography:
  headings:
    font: "PingFang SC"
    weight: 500
    line_height: 1.2
  body:
    font: "PingFang SC"
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 34
    color: "#4A3A2A"
    stroke: "#F5EDD8"
    stroke_width: 3
    band_color: "rgba(245, 237, 216, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: gentle-fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 8
    transition_duration_seconds: 0.6

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.6s"
  padding_color: "#F5EDD8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "十字绣风格, 绣线交叉纹理, 亚麻布经纬网格, 每个像素都是线交叉, 绣线微微凸起光泽, 手工刺绣温馨感, 网格像素美学"
  image_negative_prompt: "smooth, continuous, photorealistic, digital, clean, gradient, ink, paint"
  consistency_anchors:
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有亚麻布经纬网格"
  - "必须有绣线交叉纹理"
  - "文字叠加不得遮挡角色面部表情"
