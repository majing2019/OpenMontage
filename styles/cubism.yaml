identity:
  name: "Cubism"
  category: comic
  mood: geometric, fragmented, intellectual, avant-garde
  pace: moderate
  best_for: "多视角叙事、解构分析、前卫表达、思维碎片、立体思考"

visual_language:
  color_palette:
    primary: ["#8B7355", "#4A5A6B", "#C4A882"]
    accent: ["#C43A31", "#3B5998", "#6B8B5A"]
    background: "#E8E0D5"
    text: "#2A2218"
    muted: "#B0A898"
  composition: 物体被拆解成几何平面从多个角度同时呈现，五官错位，空间坍塌成二维
  texture: 毕加索式的几何解体，平面化和立体感并存，碎面拼接

style_lock:
  - "立体主义风格"
  - "几何平面解体"
  - "多角度同时呈现"
  - "五官错位重组"
  - "碎面拼接"
  - "毕加索式抽象"
  - "空间二维化"
  - "前卫艺术感"
  - "解构与重构"

typography:
  headings:
    font: Noto Sans SC
    weight: 700
    line_height: 1.2
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#2A2218"
    stroke: "#E8E0D5"
    stroke_width: 3
    band_color: "rgba(232, 224, 213, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - cut
  animation_style: cut
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 7
    transition_duration_seconds: 0.5

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.5s"
  padding_color: "#E8E0D5"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "立体主义风格, 几何平面解体, 多角度同时呈现, 五官错位重组, 碎面拼接, 毕加索式抽象, 前卫艺术感"
  image_negative_prompt: "photorealistic, realistic, smooth, organic, natural perspective, traditional portrait"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "角色必须被几何平面化解体"
  - "文字叠加不得遮挡角色面部表情"
