identity:
  name: "Cyanotype"
  category: comic
  mood: dreamy, scientific, vintage, ethereal
  pace: slow
  best_for: "蓝晒记忆、科学浪漫、植物剪影、旧日时光、普鲁士蓝叙事"

visual_language:
  color_palette:
    primary: ["#003366", "#1A5B8B", "#005599"]
    accent: ["#FFFFFF", "#4A9BC8"]
    background: "#003366"
    text: "#FFFFFF"
    muted: "#2A7BBB"
  composition: 普鲁士蓝底色上的白色剪影，仿佛蕨叶和花瓣直接放在感光纸上曝晒
  texture: 蓝晒法的普鲁士蓝底色，植物标本剪影，手工涂布感光药剂的不均匀纹理

style_lock:
  - "蓝晒法风格"
  - "普鲁士蓝底色"
  - "植物剪影留白"
  - "感光纸药剂纹理"
  - "蕨叶花瓣标本"
  - "手工涂布不均"
  - "19世纪摄影美学"
  - "蓝白双色"
  - "科学浪漫"

typography:
  headings:
    font: Noto Serif SC
    weight: 400
    line_height: 1.3
  body:
    font: Noto Serif SC
    weight: 300
    line_height: 1.6
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#FFFFFF"
    stroke: "#003366"
    stroke_width: 3
    band_color: "rgba(0, 51, 102, 0.90)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: dreamy-fade
  pacing_rules:
    min_scene_hold_seconds: 4
    max_scene_hold_seconds: 8
    transition_duration_seconds: 0.8

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.8s"
  padding_color: "#003366"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "蓝晒法风格, 普鲁士蓝底色, 植物剪影留白, 感光纸手工涂布纹理, 蕨叶花瓣标本剪影, 19世纪摄影美学, 蓝白双色"
  image_negative_prompt: "full color, multicolor, bright, warm, red, yellow, photorealistic, digital, modern"
  consistency_anchors:
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须是普鲁士蓝和白色双色"
  - "必须有植物剪影或标本感"
  - "文字叠加不得遮挡角色面部表情"
