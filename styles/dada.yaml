identity:
  name: "Dada"
  category: comic
  mood: absurd, anarchic, nonsensical, provocative
  pace: fast
  best_for: "荒诞叙事、反逻辑吐槽、解构一切、发疯文学2.0、反艺术"

visual_language:
  color_palette:
    primary: ["#2A2A2A", "#4A4A4A"]
    accent: ["#FF0000", "#FFCC00", "#000000"]
    background: "#E8E0D0"
    text: "#1A1A1A"
    muted: "#A0A0A0"
  composition: 照片碎片拼贴加涂鸦线条，报纸字母随意剪裁重组，反逻辑的视觉
  texture: 达达主义式的荒谬拼贴，现成物和涂鸦混合，像在咖啡馆桌上随手撕纸贴的

style_lock:
  - "达达主义风格"
  - "照片碎片拼贴"
  - "报纸字母剪裁"
  - "涂鸦线条混合"
  - "荒谬反逻辑"
  - "现成物拼贴"
  - "反艺术美学"
  - "随意撕纸"
  - "挑衅性视觉"

typography:
  headings:
    font: Noto Sans SC
    weight: 900
    line_height: 1.1
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.4
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#1A1A1A"
    stroke: "#E8E0D0"
    stroke_width: 3
    band_color: "rgba(232, 224, 208, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - cut
  animation_style: cut
  pacing_rules:
    min_scene_hold_seconds: 2
    max_scene_hold_seconds: 5
    transition_duration_seconds: 0.3

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.3s"
  padding_color: "#E8E0D0"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "达达主义风格, 照片碎片拼贴, 报纸字母剪裁重组, 涂鸦线条混合, 荒谬反逻辑视觉, 现成物拼贴, 反艺术美学"
  image_negative_prompt: "smooth, polished, logical, beautiful, traditional, coherent, photorealistic, neat"
  consistency_anchors:
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有拼贴碎片和涂鸦混合感"
  - "必须给人荒谬反逻辑的感觉"
  - "文字叠加不得遮挡角色面部表情"
