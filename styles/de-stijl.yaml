identity:
  name: "De Stijl"
  category: comic
  mood: orderly, universal, pure, harmonious
  pace: moderate
  best_for: "秩序美学、纯粹表达、和谐叙事、蒙德里安式审美、极简哲学"

visual_language:
  color_palette:
    primary: ["#FF0000", "#0066FF", "#FFCC00"]
    accent: ["#000000", "#FFFFFF"]
    background: "#FFFFFF"
    text: "#000000"
    muted: "#E0E0E0"
  composition: 水平垂直线条分割画面，红黄蓝三原色加黑白灰，蒙德里安的格子世界
  texture: 黑色网格线分割纯白画布，纯原色色块无混合，绝对的几何秩序

style_lock:
  - "风格派蒙德里安"
  - "水平垂直线分割"
  - "红黄蓝三原色"
  - "黑网格白底色"
  - "纯色块无混合"
  - "绝对几何秩序"
  - "蒙德里安格子"
  - "纯粹的和谐"
  - "荷兰风格派"

typography:
  headings:
    font: Noto Sans SC
    weight: 700
    line_height: 1.1
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.4
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#000000"
    stroke: "#FFFFFF"
    stroke_width: 2
    band_color: "rgba(255, 255, 255, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - cut
  animation_style: cut
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 6
    transition_duration_seconds: 0.4

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.4s"
  padding_color: "#FFFFFF"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "风格派蒙德里安美学, 水平垂直线分割构图, 红黄蓝三原色, 黑网格白底色, 纯色块无混合, 绝对几何秩序"
  image_negative_prompt: "curved, organic, gradient, realistic, photorealistic, mixed colors, complex, detailed, natural"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有水平垂直线网格分割"
  - "色彩必须限于红黄蓝黑白灰"
  - "文字叠加不得遮挡角色面部表情"
