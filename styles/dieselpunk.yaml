identity:
  name: "Diesel Punk"
  category: comic
  mood: gritty, industrial, wartime, defiant
  pace: moderate
  best_for: "工业朋克、战争年代美学、粗粝反叛、柴油与钢铁、暗黑工业风"

visual_language:
  color_palette:
    primary: ["#3A3A2E", "#4A3A1E"]
    accent: ["#8B4513", "#C43A31", "#5A6A7A"]
    background: "#E0D0A8"
    text: "#1A1208"
    muted: "#908070"
  composition: 柴油机排气管喷黑烟，铆钉钢板焊接，1940年代军事工业美学，灰暗天空
  texture: 生锈钢板铆接，柴油污渍，工业烟尘，焊接痕迹和铆钉

style_lock:
  - "柴油朋克风格"
  - "生锈钢板铆接"
  - "柴油污渍工业风"
  - "烟囱排气管黑烟"
  - "1940年代军事美学"
  - "焊接铆钉质感"
  - "暗黑工业粗粝"
  - "钢板铆接"
  - "柴油与钢铁"

typography:
  headings:
    font: Noto Sans SC
    weight: 900
    line_height: 1.1
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.4
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#1A1208"
    stroke: "#E0D0A8"
    stroke_width: 3
    band_color: "rgba(224, 208, 168, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - cut
  animation_style: cut
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 7
    transition_duration_seconds: 0.4

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.4s"
  padding_color: "#E0D0A8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "柴油朋克风格, 生锈钢板铆接, 柴油污渍工业风, 烟囱排气管黑烟, 1940年代军事工业美学, 焊接铆钉质感, 暗黑粗粝"
  image_negative_prompt: "clean, modern, digital, colorful, bright, natural, organic, photorealistic"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有工业铆钉钢板元素"
  - "必须有柴油或烟尘质感"
  - "文字叠加不得遮挡角色面部表情"
