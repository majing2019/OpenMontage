identity:
  name: "Doodle Journal"
  category: comic
  mood: intimate, casual, personal, playful
  pace: fast
  best_for: "日记体故事、朋友圈吐槽、随手记录感、私密分享、生活碎片"

visual_language:
  color_palette:
    primary: ["#3C2A1E", "#5C4A32"]
    accent: ["#FF6B9D", "#FFD93D", "#6BCB77", "#4D96FF"]
    background: "#F5E6D3"
    text: "#3C2A1E"
    muted: "#C5B5A0"
  composition: 牛皮纸底色上针管笔手绘，荧光马克笔撞色点缀，画面随意但有趣味，像翻看朋友的私密笔记本
  texture: 针管笔细线手绘感，牛皮纸肌理，荧光马克笔高亮，方格线或横线淡印

style_lock:
  - "涂鸦手账风格"
  - "牛皮纸底色"
  - "针管笔手绘线条"
  - "荧光马克笔撞色"
  - "随意轻松笔触"
  - "手写字体融入"
  - "日记本纸张肌理"
  - "简笔可爱角色"
  - "手账贴纸装饰"

typography:
  headings:
    font: "PingFang SC"
    weight: 600
    line_height: 1.2
  body:
    font: "PingFang SC"
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 34
    color: "#3C2A1E"
    stroke: "#F5E6D3"
    stroke_width: 3
    band_color: "rgba(245, 230, 211, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方，无间隙"

motion:
  transitions:
    - xfade_fade
  animation_style: fade
  pacing_rules:
    min_scene_hold_seconds: 2
    max_scene_hold_seconds: 6
    transition_duration_seconds: 0.4

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280 → 整体占满画布"
  transition: "xfade=fade, duration=0.4s"
  padding_color: "#F5E6D3"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "涂鸦手账风格, 牛皮纸底色, 针管笔手绘线条, 荧光马克笔撞色, 随意轻松笔触, 手写字体融入, 日记本纸张肌理, 简笔可爱角色, 手账贴纸装饰"
  image_negative_prompt: "photorealistic, 3D render, photograph, realistic, polished, clean digital, smooth lines, white background, dark background, formal"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "场景模板前缀从 scene_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有角色在所有画面中必须使用完全相同的角色锚定描述"
  - "所有画面必须包含 style_lock 关键词"
  - "场景模板前缀在相同场景的所有画面中必须字面一致"
  - "文字叠加不得遮挡角色面部表情"
  - "画面内文字（scene_texts）≤5字用 ai_draw，>5字用 post_only"
  - "底色必须是牛皮纸色或暖黄纸色"
  - "线条必须像手绘针管笔，不可过于光滑"
  - "荧光色只用于点缀不可大面积铺色"
