identity:
  name: "Duotone"
  category: comic
  mood: stylish, bold, graphic, striking
  pace: fast
  best_for: "态度表达、双色美学、视觉冲击、品牌感内容、强对比叙事"

visual_language:
  color_palette:
    primary: ["#FF6B35", "#004E89"]
    accent: ["#FF6B35"]
    background: "#FFF8F0"
    text: "#004E89"
    muted: "#FFC4A8"
  composition: 仅仅两种颜色完成全图，通过网点大小制造中间调，极度风格化
  texture: 双色印刷的纯粹感，网点模拟中间灰度，纸张底色透出，丝网印刷美学

style_lock:
  - "双色调风格"
  - "仅两种颜色"
  - "网点模拟灰度"
  - "丝网印刷美学"
  - "极度风格化"
  - "纸张底色透出"
  - "强对比设计感"
  - "品牌视觉质感"
  - "二色插画"

typography:
  headings:
    font: Noto Sans SC
    weight: 900
    line_height: 1.1
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.4
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#004E89"
    stroke: "#FFF8F0"
    stroke_width: 3
    band_color: "rgba(255, 248, 240, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - cut
  animation_style: cut
  pacing_rules:
    min_scene_hold_seconds: 2
    max_scene_hold_seconds: 5
    transition_duration_seconds: 0.3

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.3s"
  padding_color: "#FFF8F0"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "双色调风格, 仅两种颜色, 网点模拟灰度, 丝网印刷美学, 极度风格化, 纸张底色透出, 双色印刷质感"
  image_negative_prompt: "multicolor, full color, photorealistic, 3D render, gradient, realistic, complex palette"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "全图只能使用两种颜色"
  - "必须有网点模拟灰度效果"
  - "文字叠加不得遮挡角色面部表情"
