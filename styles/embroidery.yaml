identity:
  name: "Embroidery"
  category: comic
  mood: cozy, tactile, crafty, warm
  pace: slow
  best_for: "温暖叙事、手工温度、外婆的故事、节日温情、传统手艺"

visual_language:
  color_palette:
    primary: ["#F5E6D3", "#E8D5C0"]
    accent: ["#C43A31", "#6B8B5A", "#F5A623", "#4A90B8"]
    background: "#FBF5EC"
    text: "#4A3728"
    muted: "#C5B5A0"
  composition: 绣线针脚构成画面，不同方向的绣线形成纹理，绣绷圆形构图边框
  texture: 绣线交叉的针脚纹路，棉麻底布网格，绣线光泽，法式结粒绣点缀

style_lock:
  - "刺绣艺术风格"
  - "绣线针脚纹理"
  - "棉麻底布网格"
  - "绣线光泽质感"
  - "法式结粒绣"
  - "绣绷圆形构图"
  - "手工刺绣温度"
  - "绣线交叉纹路"
  - "传统手工艺"

typography:
  headings:
    font: Noto Serif SC
    weight: 600
    line_height: 1.2
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#4A3728"
    stroke: "#FBF5EC"
    stroke_width: 3
    band_color: "rgba(251, 245, 236, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: gentle-fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 8
    transition_duration_seconds: 0.7

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.7s"
  padding_color: "#FBF5EC"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "刺绣艺术风格, 绣线针脚纹理, 棉麻底布网格, 绣线光泽质感, 法式结粒绣, 绣绷圆形构图, 手工刺绣温度, 绣线交叉纹路"
  image_negative_prompt: "photorealistic, 3D render, photograph, smooth, digital, ink, paint, sketch, cartoon"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有绣线针脚纹理"
  - "必须有棉麻底布质感"
  - "文字叠加不得遮挡角色面部表情"
