identity:
  name: "Fauvism"
  category: comic
  mood: wild, vibrant, liberated, joyful
  pace: fast
  best_for: "自由表达、狂野色彩、快乐叙事、打破常规、野兽派情绪"

visual_language:
  color_palette:
    primary: ["#FF3300", "#00CC66", "#FFCC00"]
    accent: ["#FF00FF", "#0066FF", "#FF6600"]
    background: "#FFF8F0"
    text: "#2A1F14"
    muted: "#FFB088"
  composition: 色彩完全脱离现实约束，脸可以是绿色的，天空可以是橙色的，纯色的狂欢
  texture: 野兽派狂野色彩，粗黑或深蓝轮廓线，纯色平涂不混合，马蒂斯式的大胆

style_lock:
  - "野兽派风格"
  - "色彩脱离现实"
  - "狂野纯色平涂"
  - "粗黑轮廓线"
  - "马蒂斯式大胆"
  - "脸可以是绿色"
  - "纯色的狂欢"
  - "快乐自由表达"
  - "打破色彩规则"

typography:
  headings:
    font: Noto Sans SC
    weight: 900
    line_height: 1.1
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.4
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#2A1F14"
    stroke: "#FFF8F0"
    stroke_width: 3
    band_color: "rgba(255, 248, 240, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - cut
  animation_style: cut
  pacing_rules:
    min_scene_hold_seconds: 2
    max_scene_hold_seconds: 6
    transition_duration_seconds: 0.3

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.3s"
  padding_color: "#FFF8F0"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "野兽派风格, 色彩完全脱离现实, 狂野纯色平涂, 粗黑轮廓线, 马蒂斯式大胆配色, 纯色的狂欢, 脸可以是绿色天空可以是橙色"
  image_negative_prompt: "natural color, realistic, muted, subtle, photorealistic, traditional, gray, brown"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "色彩必须狂野不遵循现实"
  - "必须有粗黑轮廓线"
  - "文字叠加不得遮挡角色面部表情"
