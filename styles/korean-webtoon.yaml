identity:
  name: "Korean Webtoon"
  category: comic
  mood: trendy, polished, expressive, young
  pace: fast
  best_for: "年轻化内容、社交传播、都市故事、搞笑日常、颜值向"

visual_language:
  color_palette:
    primary: ["#F5F5F5", "#FFFFFF"]
    accent: ["#FFB7C5", "#B5D8FF", "#C5E8B7", "#FFE5A3"]
    background: "#FFFFFF"
    text: "#2A2A2A"
    muted: "#E0E0E0"
  composition: 干净白色画布，人物居中偏上，柔和粉彩色块点缀，条漫式垂直构图
  texture: 干净数字线条，柔和的 cel 式阴影，无渐变无噪点，像 Naver Webtoon 截屏

style_lock:
  - "韩式网络漫画"
  - "干净数字线条"
  - "柔和粉彩色块"
  - "cel式柔和阴影"
  - "条漫垂直构图"
  - "精致角色设计"
  - "白色干净背景"
  - "轻量配色"
  - "现代网漫风格"

typography:
  headings:
    font: Noto Sans SC
    weight: 700
    line_height: 1.2
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#2A2A2A"
    stroke: "#FFFFFF"
    stroke_width: 3
    band_color: "rgba(255, 255, 255, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方，无间隙"

motion:
  transitions:
    - xfade_fade
  animation_style: fade
  pacing_rules:
    min_scene_hold_seconds: 2
    max_scene_hold_seconds: 6
    transition_duration_seconds: 0.4

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280 → 整体占满画布"
  transition: "xfade=fade, duration=0.4s"
  padding_color: "#FFFFFF"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "韩式网络漫画, 干净数字线条, 柔和粉彩色块, cel式柔和阴影, 条漫垂直构图, 精致角色设计, 白色干净背景, 轻量配色, 现代网漫风格"
  image_negative_prompt: "photorealistic, 3D render, photograph, rough sketch, watercolor, oil painting, heavy shading, dark background, aggressive lines"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "场景模板前缀从 scene_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有角色在所有画面中必须使用完全相同的角色锚定描述"
  - "所有画面必须包含 style_lock 关键词"
  - "场景模板前缀在相同场景的所有画面中必须字面一致"
  - "文字叠加不得遮挡角色面部表情"
  - "画面内文字（scene_texts）≤5字用 ai_draw，>5字用 post_only"
  - "线条必须干净流畅，不可粗糙潦草"
  - "配色必须轻量柔和，不可浓重"
