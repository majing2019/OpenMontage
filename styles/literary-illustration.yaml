identity:
  name: "Literary Illustration"
  category: comic
  mood: quiet, introspective, poetic, refined
  pace: slow
  best_for: "情感叙事、散文漫笔、深夜独白、有深度的故事、文艺向"

visual_language:
  color_palette:
    primary: ["#D4C9C0", "#B8A99A"]
    accent: ["#8B9D83", "#B8A0C0", "#C4A882"]
    background: "#F5F0EB"
    text: "#3C3833"
    muted: "#C5BBB5"
  composition: 奶油底色上炭灰线描，莫兰迪灰调配色，画面有大面积留白，像翻开一本散文集
  texture: 炭灰色手工感线条，轻微做旧纸质肌理，莫兰迪色系平涂，静谧克制

style_lock:
  - "轻文艺插画风格"
  - "莫兰迪灰调配色"
  - "奶油纸张底色"
  - "炭灰色手工线条"
  - "大面积留白"
  - "静谧克制氛围"
  - "做旧纸质肌理"
  - "极简角色设计"
  - "散文书籍插画质感"

typography:
  headings:
    font: Noto Serif SC
    weight: 600
    line_height: 1.3
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.6
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#3C3833"
    stroke: "#F5F0EB"
    stroke_width: 3
    band_color: "rgba(245, 240, 235, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方，无间隙"

motion:
  transitions:
    - xfade_fade
  animation_style: gentle-fade
  pacing_rules:
    min_scene_hold_seconds: 4
    max_scene_hold_seconds: 9
    transition_duration_seconds: 0.8

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280 → 整体占满画布"
  transition: "xfade=fade, duration=0.8s"
  padding_color: "#F5F0EB"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "轻文艺插画风格, 莫兰迪灰调配色, 奶油纸张底色, 炭灰色手工线条, 大面积留白, 静谧克制氛围, 做旧纸质肌理, 极简角色设计, 散文书籍插画质感"
  image_negative_prompt: "photorealistic, 3D render, photograph, bright neon, vibrant, pure black, pure white, cartoon, anime, heavy lines"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "场景模板前缀从 scene_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有角色在所有画面中必须使用完全相同的角色锚定描述"
  - "所有画面必须包含 style_lock 关键词"
  - "场景模板前缀在相同场景的所有画面中必须字面一致"
  - "文字叠加不得遮挡角色面部表情"
  - "画面内文字（scene_texts）≤5字用 ai_draw，>5字用 post_only"
  - "配色必须是莫兰迪灰调，不可出现鲜艳颜色"
  - "底色必须是奶油色或做旧纸色"
