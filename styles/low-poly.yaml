identity:
  name: "Low Poly"
  category: comic
  mood: geometric, 3D-like, stylized, game-like
  pace: fast
  best_for: "游戏化叙事、3D几何美学、低面数造型、数字原生内容、像素之外的选择"

visual_language:
  color_palette:
    primary: ["#4A90B8", "#6BA368", "#F5A623"]
    accent: ["#E85D5D", "#F5C842", "#8B6BAE"]
    background: "#E8F0F8"
    text: "#2A3A4A"
    muted: "#B0C0D0"
  composition: 三角形网格面组成一切，每个三角面有独立的颜色和光影，低多边形3D感
  texture: 三角网格面光影，低面数几何体，每个平面有独立纯色，像游戏低模截图

style_lock:
  - "低多边形风格"
  - "三角网格面"
  - "低面数几何体"
  - "独立面纯色光影"
  - "3D游戏低模感"
  - "几何折纸立体"
  - "面片拼接"
  - "Clean低面美学"
  - "数字雕塑感"

typography:
  headings:
    font: Noto Sans SC
    weight: 700
    line_height: 1.2
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#2A3A4A"
    stroke: "#E8F0F8"
    stroke_width: 3
    band_color: "rgba(232, 240, 248, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: fade
  pacing_rules:
    min_scene_hold_seconds: 2
    max_scene_hold_seconds: 6
    transition_duration_seconds: 0.4

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.4s"
  padding_color: "#E8F0F8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "低多边形风格, 三角网格面, 低面数几何体, 独立面纯色光影, 3D游戏低模感, 几何折纸立体感, Clean低面美学"
  image_negative_prompt: "photorealistic, smooth, organic, round, realistic, high-poly, detailed, texture mapped"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有三角网格面几何感"
  - "每个面必须是独立纯色"
  - "文字叠加不得遮挡角色面部表情"
