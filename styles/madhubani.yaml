identity:
  name: "Madhubani"
  category: comic
  mood: folk, intricate, celebratory, nature-connected
  pace: moderate
  best_for: "印度民间故事、自然与生命、装饰美学、仪式叙事、异域民俗"

visual_language:
  color_palette:
    primary: ["#C43A31", "#F5A623", "#2E8B57"]
    accent: ["#FF6633", "#9933CC", "#FFCC00"]
    background: "#F5EDD8"
    text: "#3C2A0A"
    muted: "#D4C498"
  composition: 画面不留空白，满幅细密图案填充，自然元素（鱼鸟花树）与人交织
  texture: 印度民间绘画传统，竹笔蘸天然颜料，满幅不留白，几何与自然图案交替

style_lock:
  - "印度民间绘画风格"
  - "满幅不留空白"
  - "细密图案填充"
  - "鱼鸟花树自然元素"
  - "竹笔天然颜料"
  - "几何自然交替"
  - "Madhubani民俗"
  - "鲜艳传统配色"
  - "仪式感装饰"

typography:
  headings:
    font: Noto Serif SC
    weight: 600
    line_height: 1.2
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#3C2A0A"
    stroke: "#F5EDD8"
    stroke_width: 3
    band_color: "rgba(245, 237, 216, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 8
    transition_duration_seconds: 0.6

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.6s"
  padding_color: "#F5EDD8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "印度民间Madhubani绘画风格, 满幅不留空白, 细密图案填充, 鱼鸟花树自然元素交织, 几何与自然交替, 鲜艳传统配色"
  image_negative_prompt: "empty space, minimal, photorealistic, 3D, western, modern, blank background, simple"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "画面必须满幅不留空白"
  - "必须有细密装饰图案"
  - "文字叠加不得遮挡角色面部表情"
