identity:
  name: "Manhua"
  category: comic
  mood: martial, dynamic, bold, intense
  pace: fast
  best_for: "武侠叙事、战斗场面、港漫风格、江湖恩仇、热血格斗"

visual_language:
  color_palette:
    primary: ["#C43A31", "#000000", "#FFD700"]
    accent: ["#FF6600", "#0066FF", "#00CC66"]
    background: "#FFFFFF"
    text: "#000000"
    muted: "#999999"
  composition: 港漫式的大开页特写，气劲化形的流线，肌肉爆衫的体型
  texture: 港漫钢笔排线加网点，气劲和内力可视化，精致的盔甲武器细节

style_lock:
  - "港漫风格"
  - "气劲内力可视化"
  - "大开页特写"
  - "钢笔排线网点"
  - "精致盔甲武器"
  - "肌肉爆衫体型"
  - "武侠战斗美学"
  - "江湖热血"
  - "香港漫画传统"

typography:
  headings:
    font: Noto Sans SC
    weight: 900
    line_height: 1.0
  body:
    font: Noto Sans SC
    weight: 700
    line_height: 1.3
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#000000"
    stroke: "#FFFFFF"
    stroke_width: 2
    band_color: "rgba(255, 255, 255, 0.90)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - cut
  animation_style: cut
  pacing_rules:
    min_scene_hold_seconds: 2
    max_scene_hold_seconds: 5
    transition_duration_seconds: 0.3

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.3s"
  padding_color: "#FFFFFF"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "港漫风格, 气劲内力可视化, 大开页特写, 钢笔排线加网点, 精致盔甲武器细节, 肌肉爆衫体型, 武侠战斗美学, 香港漫画传统"
  image_negative_prompt: "photorealistic, soft, gentle, cute, watercolor, simple"
  consistency_anchors:
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有气劲或内力可视化元素"
  - "必须有钢笔排线或网点纹理"
  - "文字叠加不得遮挡角色面部表情"
