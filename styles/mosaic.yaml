identity:
  name: "Mosaic"
  category: comic
  mood: ancient, fragmented, enduring, transcendent
  pace: slow
  best_for: "永恒叙事、碎片化表达、历史感、拼合之美、拜占庭美学"

visual_language:
  color_palette:
    primary: ["#C4A020", "#8B6914"]
    accent: ["#C43A31", "#3B5998", "#2E8B57", "#FFD700"]
    background: "#F5EDD8"
    text: "#3C2A1E"
    muted: "#D0C0A0"
  composition: 细碎马赛克方块拼成画面，彩色玻璃方片间隙可见，拜占庭教堂镶嵌壁画感
  texture: 方片马赛克间隙，石材和彩色玻璃碎片的拼接，金箔打底反光

style_lock:
  - "马赛克镶嵌风格"
  - "彩色方片拼接"
  - "马赛克间隙可见"
  - "金箔打底反光"
  - "拜占庭镶嵌壁画"
  - "碎片拼合之美"
  - "石材玻璃拼贴"
  - "古老永恒质感"
  - "教堂镶嵌艺术"

typography:
  headings:
    font: Noto Serif SC
    weight: 700
    line_height: 1.2
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#3C2A1E"
    stroke: "#F5EDD8"
    stroke_width: 3
    band_color: "rgba(245, 237, 216, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: gentle-fade
  pacing_rules:
    min_scene_hold_seconds: 4
    max_scene_hold_seconds: 8
    transition_duration_seconds: 0.8

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.8s"
  padding_color: "#F5EDD8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "马赛克镶嵌风格, 彩色方片拼接, 马赛克间隙可见, 金箔打底反光, 拜占庭镶嵌壁画, 碎片拼合之美, 教堂镶嵌艺术"
  image_negative_prompt: "smooth, continuous, photorealistic, blended, gradient, natural, organic, clean lines"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有马赛克方片拼接纹理"
  - "必须有方块间隙"
  - "文字叠加不得遮挡角色面部表情"
