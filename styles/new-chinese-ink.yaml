identity:
  name: "New Chinese Ink"
  category: comic
  mood: elegant, cultured, witty, oriental
  pace: moderate
  best_for: "中国故事、人生哲理、幽默讽刺、文化底蕴、东方审美"

visual_language:
  color_palette:
    primary: ["#2C2416", "#4A3728"]
    accent: ["#C43A31", "#3B5998", "#C17F59"]
    background: "#F5F0E6"
    text: "#2C2416"
    muted: "#B0A898"
  composition: 宣纸质地上毛笔枯笔勾勒，大面积留白，朱砂红与靛蓝点染，像丰子恺漫画有了淡彩
  texture: 枯笔飞白线条，墨色浓淡变化，宣纸米白晕染，东方文人画气质

style_lock:
  - "新中式水墨漫画"
  - "宣纸米白底色"
  - "枯笔飞白线条"
  - "墨色浓淡变化"
  - "朱砂红靛蓝点染"
  - "大面积留白"
  - "东方文人画气质"
  - "简练写意角色"
  - "丰子恺式幽默"

typography:
  headings:
    font: Noto Serif SC
    weight: 900
    line_height: 1.15
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#2C2416"
    stroke: "#F5F0E6"
    stroke_width: 3
    band_color: "rgba(245, 240, 230, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方，无间隙"

motion:
  transitions:
    - xfade_fade
  animation_style: fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 7
    transition_duration_seconds: 0.5

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280 → 整体占满画布"
  transition: "xfade=fade, duration=0.5s"
  padding_color: "#F5F0E6"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "新中式水墨漫画, 宣纸米白底色, 枯笔飞白线条, 墨色浓淡变化, 朱砂红靛蓝点染, 大面积留白, 东方文人画气质, 简练写意角色, 丰子恺式幽默"
  image_negative_prompt: "photorealistic, 3D render, photograph, colorful, vibrant, anime, cartoon, digital art, heavy ink, dark background, gongbi, complex detail"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "场景模板前缀从 scene_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有角色在所有画面中必须使用完全相同的角色锚定描述"
  - "所有画面必须包含 style_lock 关键词"
  - "场景模板前缀在相同场景的所有画面中必须字面一致"
  - "文字叠加不得遮挡角色面部表情"
  - "画面内文字（scene_texts）≤5字用 ai_draw，>5字用 post_only"
  - "线条必须带有毛笔枯笔飞白质感，不可光滑"
  - "色彩点缀仅限于朱砂红和靛蓝，不可多色"
  - "底色必须是宣纸米白色"
