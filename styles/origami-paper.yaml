identity:
  name: "Origami Paper"
  category: comic
  mood: geometric, clever, tactile, minimalist
  pace: moderate
  best_for: "创意故事、几何美学、极简叙事、设计感表达、手作温度"

visual_language:
  color_palette:
    primary: ["#E8D5B7", "#D4C4A8"]
    accent: ["#E85D5D", "#4A90B8", "#F5C842", "#6BA368"]
    background: "#F5F0E6"
    text: "#3C2A1E"
    muted: "#C5B5A0"
  composition: 折纸几何面构成角色和场景，三角形平面折叠光影，纸张厚度可见
  texture: 折纸折叠棱线，纸张双面色差，锐利几何面，瓦楞纸肌理

style_lock:
  - "折纸艺术风格"
  - "几何面折叠造型"
  - "三角形平面光影"
  - "纸张双面色差"
  - "锐利折叠棱线"
  - "瓦楞纸肌理"
  - "极简几何美学"
  - "手工折纸质感"
  - "创意纸艺"

typography:
  headings:
    font: Noto Sans SC
    weight: 700
    line_height: 1.2
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#3C2A1E"
    stroke: "#F5F0E6"
    stroke_width: 3
    band_color: "rgba(245, 240, 230, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 7
    transition_duration_seconds: 0.5

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.5s"
  padding_color: "#F5F0E6"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "折纸艺术风格, 几何面折叠造型, 三角形平面光影, 纸张双面色差, 锐利折叠棱线, 瓦楞纸肌理, 极简几何美学, 手工折纸质感"
  image_negative_prompt: "photorealistic, 3D render, photograph, smooth curves, round, organic, realistic anatomy"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "角色和场景必须由几何折纸面构成"
  - "必须有明显的折叠棱线和光影面"
  - "文字叠加不得遮挡角色面部表情"
