identity:
  name: "Pastel Chalk"
  category: comic
  mood: soft, dreamy, gentle, nostalgic
  pace: slow
  best_for: "温柔叙事、少女心、回忆童年、柔软日常、治愈瞬间"

visual_language:
  color_palette:
    primary: ["#FFE4E1", "#E8D5F0", "#D4E8F0"]
    accent: ["#FFB7C5", "#B5D8FF", "#C5E8B7", "#FFE5A3"]
    background: "#F5F0E8"
    text: "#5C4A5C"
    muted: "#D4C8D0"
  composition: 粉彩在粗糙纸面上轻轻涂抹，颜色像被阳光漂白过一样柔和
  texture: 粉彩颗粒散落纸面，柔光笼罩，像用手指抹开的粉笔，绒绒的磨砂表面

style_lock:
  - "粉彩粉笔风格"
  - "柔和粉彩色调"
  - "绒面磨砂质感"
  - "粉彩颗粒散落"
  - "阳光漂白感"
  - "手指抹开晕染"
  - "粗糙纸面纹理"
  - "温柔梦幻"
  - "少女感插画"

typography:
  headings:
    font: "PingFang SC"
    weight: 500
    line_height: 1.3
  body:
    font: "PingFang SC"
    weight: 300
    line_height: 1.6
  caption:
    font: "PingFang SC Regular"
    font_size: 34
    color: "#5C4A5C"
    stroke: "#F5F0E8"
    stroke_width: 3
    band_color: "rgba(245, 240, 232, 0.90)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: dreamy-fade
  pacing_rules:
    min_scene_hold_seconds: 4
    max_scene_hold_seconds: 8
    transition_duration_seconds: 0.8

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.8s"
  padding_color: "#F5F0E8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "粉彩粉笔风格, 柔和粉彩色调, 绒面磨砂质感, 粉彩颗粒散落纸面, 阳光漂白感, 手指抹开晕染, 粗糙纸面纹理, 温柔梦幻"
  image_negative_prompt: "photorealistic, 3D render, photograph, sharp, dark, vibrant, saturated, clean digital, smooth"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "色彩必须柔和粉彩，不可鲜艳"
  - "必须有粉彩颗粒和磨砂质感"
  - "文字叠加不得遮挡角色面部表情"
