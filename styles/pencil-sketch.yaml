identity:
  name: "Pencil Sketch"
  category: comic
  mood: intimate, raw, artistic, thoughtful
  pace: slow
  best_for: "心情独白、艺术表达、私人叙事、草稿美学、未完成感"

visual_language:
  color_palette:
    primary: ["#3C3833", "#5C5853"]
    accent: ["#8B7D6B"]
    background: "#F5F0E8"
    text: "#3C3833"
    muted: "#B0A898"
  composition: 铅笔线条在纸面自由排线，手绘草稿感，未完成的留白，橡皮擦痕可见
  texture: 石墨铅笔排线纹理，素描纸纤维颗粒，橡皮擦拭痕迹，手指晕开阴影

style_lock:
  - "铅笔素描风格"
  - "石墨排线纹理"
  - "素描纸纤维颗粒"
  - "手绘草稿感"
  - "橡皮擦拭痕迹"
  - "未完成的留白"
  - "手指晕开阴影"
  - "素描本质感"
  - "艺术草稿美学"

typography:
  headings:
    font: Noto Serif SC
    weight: 400
    line_height: 1.3
  body:
    font: Noto Serif SC
    weight: 300
    line_height: 1.6
  caption:
    font: "PingFang SC Regular"
    font_size: 34
    color: "#3C3833"
    stroke: "#F5F0E8"
    stroke_width: 3
    band_color: "rgba(245, 240, 232, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: gentle-fade
  pacing_rules:
    min_scene_hold_seconds: 4
    max_scene_hold_seconds: 9
    transition_duration_seconds: 0.8

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.8s"
  padding_color: "#F5F0E8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "铅笔素描风格, 石墨排线纹理, 素描纸纤维颗粒, 手绘草稿感, 橡皮擦拭痕迹, 未完成的留白感, 晕开阴影, 素描本质感"
  image_negative_prompt: "color, colorful, digital, clean, polished, photorealistic, 3D render, ink, smooth lines, vector"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须是单色铅笔质感，不可有彩色"
  - "必须有排线和颗粒纹理"
  - "文字叠加不得遮挡角色面部表情"
