identity:
  name: "Persian Miniature"
  category: comic
  mood: ornate, poetic, jewel-toned, legendary
  pace: slow
  best_for: "传奇故事、诗意叙事、异域风情、宫廷爱情、一千零一夜"

visual_language:
  color_palette:
    primary: ["#1A3A6B", "#2A1F4E"]
    accent: ["#C43A31", "#D4A520", "#2E8B57", "#FF6600"]
    background: "#F5EDD8"
    text: "#1A2A3C"
    muted: "#C5B898"
  composition: 平面化无透视的装饰性构图，人物侧脸入画，满幅纹样不留空，金色描边
  texture: 细密笔触的装饰纹样，金箔点金，宝石般浓郁色彩，波斯地毯般的纹样密度

style_lock:
  - "波斯细密画风格"
  - "平面装饰性构图"
  - "金箔点金描边"
  - "宝石般浓郁色彩"
  - "满幅装饰纹样"
  - "人物侧脸入画"
  - "波斯地毯纹样"
  - "一千零一夜美学"
  - "细密笔触"

typography:
  headings:
    font: Noto Serif SC
    weight: 600
    line_height: 1.3
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#1A2A3C"
    stroke: "#F5EDD8"
    stroke_width: 3
    band_color: "rgba(245, 237, 216, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: gentle-fade
  pacing_rules:
    min_scene_hold_seconds: 4
    max_scene_hold_seconds: 9
    transition_duration_seconds: 0.8

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.8s"
  padding_color: "#F5EDD8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "波斯细密画风格, 平面装饰性构图, 金箔点金描边, 宝石般浓郁色彩, 满幅装饰纹样, 人物侧脸入画, 波斯地毯纹样密度, 一千零一夜美学"
  image_negative_prompt: "photorealistic, 3D, perspective, shadow, realistic anatomy, western composition, minimal, empty space"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须是平面无透视装饰性构图"
  - "必须有金箔或金色描边元素"
  - "文字叠加不得遮挡角色面部表情"
