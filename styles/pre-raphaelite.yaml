identity:
  name: "Pre-Raphaelite"
  category: comic
  mood: romantic, medieval, poetic, luminous
  pace: slow
  best_for: "中世纪浪漫、诗意叙事、骑士与少女、唯美主义、古典爱情"

visual_language:
  color_palette:
    primary: ["#2E8B57", "#4A5A3A", "#8B6914"]
    accent: ["#C43A31", "#D4A020", "#3B5998", "#8B5A6B"]
    background: "#F0E8D8"
    text: "#2A1A0A"
    muted: "#B0A080"
  composition: 中世纪花园或森林背景下，人物有拉斐尔前派式的修长身形和忧郁面容
  texture: 宝石般明亮的色彩在白色底子上发光，植物细节极其丰富，像罗塞蒂的画

style_lock:
  - "拉斐尔前派风格"
  - "宝石般明亮色彩"
  - "白色底子上发光"
  - "中世纪浪漫美学"
  - "修长忧郁人物"
  - "植物细节极其丰富"
  - "罗塞蒂式唯美"
  - "骑士与少女"
  - "诗意古典"

typography:
  headings:
    font: Noto Serif SC
    weight: 600
    line_height: 1.3
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.6
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#2A1A0A"
    stroke: "#F0E8D8"
    stroke_width: 3
    band_color: "rgba(240, 232, 216, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: gentle-fade
  pacing_rules:
    min_scene_hold_seconds: 4
    max_scene_hold_seconds: 8
    transition_duration_seconds: 0.8

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.8s"
  padding_color: "#F0E8D8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "拉斐尔前派风格, 宝石般明亮色彩, 白色底子上发光, 中世纪浪漫美学, 修长忧郁人物, 植物细节极其丰富, 罗塞蒂式唯美"
  image_negative_prompt: "modern, photorealistic, dark, gloomy, simple, minimal, abstract"
  consistency_anchors:
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "色彩必须明亮如宝石发光"
  - "必须有丰富植物细节"
  - "文字叠加不得遮挡角色面部表情"
