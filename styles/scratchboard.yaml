identity:
  name: "Scratchboard"
  category: comic
  mood: dramatic, high-contrast, intricate, tactile
  pace: moderate
  best_for: "黑白反转、高对比叙事、精细线描、黑夜场景、星光与发光体"

visual_language:
  color_palette:
    primary: ["#000000", "#0A0A0A"]
    accent: ["#FFFFFF"]
    background: "#000000"
    text: "#FFFFFF"
    muted: "#666666"
  composition: 黑色底板刮出白色线条，一切从黑暗中诞生，线条密度控制明暗层次
  texture: 刮板刀痕纹理，黑底白线的反向世界，由线密度的不同制造灰阶

style_lock:
  - "刮板画风格"
  - "黑底白线反向"
  - "刮刀刻痕纹理"
  - "线条密度灰阶"
  - "黑暗中诞生"
  - "精细线描"
  - "高对比黑白反转"
  - "木板雕刻质感"
  - "负片美学"

typography:
  headings:
    font: Noto Sans SC
    weight: 700
    line_height: 1.2
  body:
    font: Noto Sans SC
    weight: 300
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#FFFFFF"
    stroke: "#000000"
    stroke_width: 3
    band_color: "rgba(0, 0, 0, 0.88)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - cut
    - xfade_fade
  animation_style: dramatic-cut
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 7
    transition_duration_seconds: 0.5

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.5s"
  padding_color: "#000000"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "刮板画风格, 黑底白线反向, 刮刀刻痕纹理, 线条密度灰阶, 黑暗中诞生的画面, 精细线描, 高对比黑白反转, 负片美学"
  image_negative_prompt: "color, white background, bright, photorealistic, 3D, smooth, gradient, gray wash, watercolor"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须是黑底白线反向画面"
  - "必须有刮刻刀痕纹理"
  - "文字叠加不得遮挡角色面部表情"
