identity:
  name: "Shadow Puppet"
  category: comic
  mood: silhouetted, theatrical, ancient, dramatic
  pace: moderate
  best_for: "民间故事、戏剧化叙事、古风演义、皮影戏美学、光影叙事"

visual_language:
  color_palette:
    primary: ["#2A1F14", "#1A1208"]
    accent: ["#C43A31", "#D4A574", "#8B9D6B"]
    background: "#F5E8C8"
    text: "#2A1F14"
    muted: "#A09070"
  composition: 背光投影般的剪影人物，关节分段可活动，皮影戏舞台光，半透明着色
  texture: 牛皮镂刻透光，关节铆钉连接，半透明矿物颜料着色，灯光从背后照出颜色

style_lock:
  - "皮影戏风格"
  - "背光剪影人物"
  - "关节分段可动"
  - "牛皮镂刻透光"
  - "半透明着色"
  - "灯光从背后照"
  - "传统戏曲造型"
  - "铆钉连接关节"
  - "中国传统皮影"

typography:
  headings:
    font: Noto Serif SC
    weight: 700
    line_height: 1.2
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#2A1F14"
    stroke: "#F5E8C8"
    stroke_width: 3
    band_color: "rgba(245, 232, 200, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 8
    transition_duration_seconds: 0.6

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.6s"
  padding_color: "#F5E8C8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "皮影戏风格, 背光剪影人物, 关节分段可动, 牛皮镂刻透光, 半透明着色, 灯光从背后照, 传统戏曲造型, 铆钉连接关节, 中国传统皮影艺术"
  image_negative_prompt: "3D, photorealistic, modern, smooth, round, realistic anatomy, white background, solid, opaque"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "人物必须有剪影透光感"
  - "必须有皮影戏关节分段特征"
  - "文字叠加不得遮挡角色面部表情"
