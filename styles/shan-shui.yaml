identity:
  name: "Shan Shui"
  category: comic
  mood: contemplative, vast, natural, poetic
  pace: slow
  best_for: "山水意境、哲学叙事、天地辽阔、诗意栖居、中国山水画美学"

visual_language:
  color_palette:
    primary: ["#2A1F14", "#000000"]
    accent: ["#C43A31", "#3B5998"]
    background: "#F5EDD8"
    text: "#2A1F14"
    muted: "#B0A090"
  composition: 深远山水全景构图，人物在大山大水间只占一点，云雾留白，皴法山石
  texture: 水墨皴擦山石纹理，米黄宣纸底色，云雾留白透气，枯笔与湿墨交替

style_lock:
  - "中国山水画风格"
  - "深远全景构图"
  - "水墨皴擦纹理"
  - "云雾留白透气"
  - "宣纸米黄底色"
  - "人物点景渺小"
  - "枯笔湿墨交替"
  - "天地辽阔意境"
  - "宋元山水美学"

typography:
  headings:
    font: Noto Serif SC
    weight: 400
    line_height: 1.3
  body:
    font: Noto Serif SC
    weight: 300
    line_height: 1.6
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#2A1F14"
    stroke: "#F5EDD8"
    stroke_width: 3
    band_color: "rgba(245, 237, 216, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: gentle-fade
  pacing_rules:
    min_scene_hold_seconds: 4
    max_scene_hold_seconds: 10
    transition_duration_seconds: 1.0

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=1.0s"
  padding_color: "#F5EDD8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "中国山水画风格, 深远全景构图, 水墨皴擦山石纹理, 云雾留白透气, 宣纸米黄底色, 人物在大山大水间渺小点景, 宋元山水意境"
  image_negative_prompt: "photorealistic, 3D, western perspective, close-up, portrait, urban, architecture"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有深远山水构图"
  - "必须有水墨皴擦纹理"
  - "文字叠加不得遮挡角色面部表情"
