identity:
  name: "Shoujo Manga"
  category: comic
  mood: romantic, sparkling, emotional, dreamy
  pace: moderate
  best_for: "恋爱故事、少女心、浪漫叙事、美好幻想、心动的瞬间"

visual_language:
  color_palette:
    primary: ["#FFFFFF", "#FFF5FA"]
    accent: ["#FFB7C5", "#FFD1E0", "#D4B8E8", "#B5D8FF"]
    background: "#FFFFFF"
    text: "#4A3A4A"
    muted: "#E8D8E0"
  composition: 少女漫标志性的大眼睛和闪光瞳，花藤背景和泡泡，速度线加星星，眼神特写
  texture: 闪亮大眼睛特写，花朵花藤背景，星星闪光效果，纤细优美的轮廓线

style_lock:
  - "少女漫画风格"
  - "闪亮大眼睛特写"
  - "花藤花束背景"
  - "星星闪光效果"
  - "纤细优美线条"
  - "粉色系点缀"
  - "浪漫泡泡氛围"
  - "少女心爆棚"
  - "日系少女漫"

typography:
  headings:
    font: "PingFang SC"
    weight: 500
    line_height: 1.3
  body:
    font: "PingFang SC"
    weight: 300
    line_height: 1.6
  caption:
    font: "PingFang SC Regular"
    font_size: 34
    color: "#4A3A4A"
    stroke: "#FFFFFF"
    stroke_width: 2
    band_color: "rgba(255, 245, 250, 0.90)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: dreamy-fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 7
    transition_duration_seconds: 0.6

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.6s"
  padding_color: "#FFFFFF"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "少女漫画风格, 闪亮大眼睛特写, 花藤花束背景, 星星闪光效果, 纤细优美线条, 粉色系点缀, 浪漫泡泡氛围, 日系少女漫"
  image_negative_prompt: "realistic, dark, gritty, rough, angular, thick lines, horror, serious, mature"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有闪亮大眼睛或花藤星星元素"
  - "线条必须纤细优美"
  - "文字叠加不得遮挡角色面部表情"
