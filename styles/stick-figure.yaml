identity:
  name: "Stick Figure"
  category: comic
  mood: minimalist, witty, self-deprecating, clever
  pace: fast
  best_for: "极简吐槽、自黑幽默、哲学段子、反内卷、火柴人暴漫"

visual_language:
  color_palette:
    primary: ["#000000", "#1A1A1A"]
    accent: ["#FF0000", "#000000"]
    background: "#FFFFFF"
    text: "#000000"
    muted: "#999999"
  composition: 火柴人四肢躯干最少线条，极致的极简主义，白底上的几根黑线，表情全靠简单符号
  texture: 孩童般的涂鸦线条，有点歪的圆，长短不一的四肢，像在黑板上用粉笔画的

style_lock:
  - "火柴人风格"
  - "极简线条"
  - "简单符号表情"
  - "孩童般涂鸦"
  - "白底黑线"
  - "不完美的歪圆"
  - "暴走漫画感"
  - "极简角色"
  - "自黑幽默"

typography:
  headings:
    font: Noto Sans SC
    weight: 900
    line_height: 1.1
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.4
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#000000"
    stroke: "#FFFFFF"
    stroke_width: 2
    band_color: "rgba(255, 255, 255, 0.90)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - cut
  animation_style: cut
  pacing_rules:
    min_scene_hold_seconds: 2
    max_scene_hold_seconds: 5
    transition_duration_seconds: 0.3

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.3s"
  padding_color: "#FFFFFF"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "火柴人风格, 极简线条, 简单符号表情, 孩童般涂鸦, 白底黑线, 不完美的歪圆, 暴走漫画感, 极简角色设计, 自黑幽默"
  image_negative_prompt: "realistic, detailed, photorealistic, 3D render, complex, shaded, colored, anatomy, proportional, polished"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "角色必须火柴人极简线条"
  - "线条必须像手绘涂鸦"
  - "文字叠加不得遮挡角色面部表情"
