identity:
  name: "Street Art"
  category: comic
  mood: urban, rebellious, bold, raw
  pace: fast
  best_for: "街头表达、反叛叙事、城市声音、涂鸦文化、地下态度"

visual_language:
  color_palette:
    primary: ["#2A2A2A", "#4A4A4A"]
    accent: ["#FF3300", "#FFCC00", "#00CCFF", "#FF00FF"]
    background: "#D0C0A0"
    text: "#1A1A1A"
    muted: "#808080"
  composition: 砖墙纹理上喷漆涂鸦，模板喷涂的锐利边缘，大色块加粗轮廓线
  texture: 砖墙粗糙表面，喷漆飞溅和流淌，模板镂空痕迹，Banksy式的社会讽刺

style_lock:
  - "街头涂鸦风格"
  - "砖墙粗糙表面"
  - "喷漆飞溅流淌"
  - "模板镂空喷涂"
  - "Banksy式讽刺"
  - "粗轮廓大色块"
  - "城市地下美学"
  - "街头艺术质感"
  - "反叛态度表达"

typography:
  headings:
    font: Noto Sans SC
    weight: 900
    line_height: 1.1
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.4
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#1A1A1A"
    stroke: "#D0C0A0"
    stroke_width: 3
    band_color: "rgba(208, 192, 160, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - cut
  animation_style: cut
  pacing_rules:
    min_scene_hold_seconds: 2
    max_scene_hold_seconds: 6
    transition_duration_seconds: 0.3

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.3s"
  padding_color: "#D0C0A0"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "街头涂鸦风格, 砖墙粗糙表面, 喷漆飞溅流淌, 模板镂空喷涂, Banksy式社会讽刺, 粗轮廓大色块, 城市地下美学"
  image_negative_prompt: "photorealistic, polished, clean, indoor, corporate, smooth, delicate, watercolor"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有砖墙或城市墙面肌理"
  - "必须有喷漆飞溅或模板喷涂感"
  - "文字叠加不得遮挡角色面部表情"
