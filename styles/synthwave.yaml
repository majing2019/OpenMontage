identity:
  name: "Synthwave"
  category: comic
  mood: retro-futuristic, nostalgic, cool, dreamy
  pace: fast
  best_for: "80年代怀旧、复古科技、电子音乐文化、霓虹美学、蒸汽波梗"

visual_language:
  color_palette:
    primary: ["#1A0033", "#2D0059"]
    accent: ["#FF00FF", "#00FFFF", "#FF6600", "#FFCC00"]
    background: "#0D0020"
    text: "#FFCCFF"
    muted: "#660099"
  composition: 暗紫底色上的霓虹网格线，落日渐变天空，铬金属反光，三角形山脉剪影
  texture: 80年代合成器波形，VHS噪点，CRT扫描线，霓虹网格地面延伸到无限远

style_lock:
  - "合成波复古风格"
  - "霓虹网格线"
  - "落日渐变天空"
  - "铬金属反光"
  - "VHS噪点质感"
  - "CRT扫描线"
  - "80年代电子美学"
  - "三角形山脉剪影"
  - "复古未来主义"

typography:
  headings:
    font: Noto Sans SC
    weight: 700
    line_height: 1.2
  body:
    font: Noto Sans SC
    weight: 300
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#FFCCFF"
    stroke: "#1A0033"
    stroke_width: 3
    band_color: "rgba(13, 0, 32, 0.88)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 6
    transition_duration_seconds: 0.5

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.5s"
  padding_color: "#0D0020"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "合成波复古风格, 霓虹网格线, 落日渐变天空, 铬金属反光, VHS噪点质感, CRT扫描线, 80年代电子美学, 三角形山脉剪影, 复古未来主义"
  image_negative_prompt: "natural, realistic, modern, daylight, rural, historical, watercolor, white background, bright natural light"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有霓虹发光元素"
  - "必须有80年代复古电子美学感"
  - "文字叠加不得遮挡角色面部表情"
