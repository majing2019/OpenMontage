identity:
  name: "Tarot"
  category: comic
  mood: mystical, symbolic, archetypal, occult
  pace: slow
  best_for: "命运叙事、象征寓言、玄学梗、心理原型、神秘学美学"

visual_language:
  color_palette:
    primary: ["#1A1A2E", "#2A2A4E"]
    accent: ["#FFD700", "#C43A31", "#4A90B8", "#9933CC"]
    background: "#0D0D1A"
    text: "#FFEECC"
    muted: "#5A5A7A"
  composition: 塔罗牌式上下分层构图，上方象征符号下方人物，罗马数字标题，华丽花框
  texture: 烫金花框边框，泛黄旧卡牌质感，神秘符号和占星图案，韦特塔罗美学

style_lock:
  - "塔罗牌风格"
  - "烫金花框边框"
  - "神秘符号占星图案"
  - "上下分层卡牌构图"
  - "罗马数字标题"
  - "韦特塔罗美学"
  - "泛黄旧卡牌质感"
  - "原型象征叙事"
  - "神秘学插画"

typography:
  headings:
    font: Noto Serif SC
    weight: 700
    line_height: 1.2
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#FFEECC"
    stroke: "#0D0D1A"
    stroke_width: 3
    band_color: "rgba(13, 13, 26, 0.88)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: dreamy-fade
  pacing_rules:
    min_scene_hold_seconds: 4
    max_scene_hold_seconds: 8
    transition_duration_seconds: 0.8

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.8s"
  padding_color: "#0D0D1A"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "塔罗牌风格, 烫金花框边框, 神秘符号占星图案, 上下分层卡牌构图, 罗马数字标题, 韦特塔罗美学, 泛黄旧卡牌质感, 神秘学插画"
  image_negative_prompt: "photorealistic, modern, casual, simple, minimal, white background, cartoon"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有塔罗牌式分层构图"
  - "必须有花框或神秘符号元素"
  - "文字叠加不得遮挡角色面部表情"
