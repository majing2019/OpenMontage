identity:
  name: "Thangka"
  category: comic
  mood: sacred, ornate, meditative, cosmic
  pace: slow
  best_for: "神圣叙事、精神旅程、佛教美学、宇宙观、庄严华丽"

visual_language:
  color_palette:
    primary: ["#C43A31", "#003399", "#FFCC00", "#2E8B57"]
    accent: ["#FFD700", "#FFFFFF"]
    background: "#F5EDD8"
    text: "#2A1A0A"
    muted: "#A08060"
  composition: 唐卡式中心主尊加四周小格的曼荼罗构图，金色描线和珠宝般色彩
  texture: 矿物颜料在棉布上的质感，金色勾线华丽，曼荼罗几何精确

style_lock:
  - "唐卡绘画风格"
  - "曼荼罗中心构图"
  - "金色勾线华丽"
  - "矿物颜料棉布"
  - "珠宝般浓郁色彩"
  - "藏传佛教美学"
  - "庄严神圣华丽"
  - "四周小格叙事"
  - "宇宙曼荼罗"

typography:
  headings:
    font: Noto Serif SC
    weight: 700
    line_height: 1.2
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#2A1A0A"
    stroke: "#F5EDD8"
    stroke_width: 3
    band_color: "rgba(245, 237, 216, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: gentle-fade
  pacing_rules:
    min_scene_hold_seconds: 4
    max_scene_hold_seconds: 10
    transition_duration_seconds: 1.0

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=1.0s"
  padding_color: "#F5EDD8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "唐卡绘画风格, 曼荼罗中心构图, 金色勾线华丽, 矿物颜料棉布质感, 珠宝般浓郁色彩, 藏传佛教美学, 庄严神圣"
  image_negative_prompt: "photorealistic, modern, minimal, simple, casual, cartoon, abstract"
  consistency_anchors:
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有金色勾线和华丽感"
  - "必须有曼荼罗式的几何构图感"
  - "文字叠加不得遮挡角色面部表情"
