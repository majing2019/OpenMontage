identity:
  name: "Ukiyo-e"
  category: comic
  mood: elegant, historical, refined, poetic
  pace: slow
  best_for: "古典故事、文化题材、诗意叙事、日式美学、历史演义"

visual_language:
  color_palette:
    primary: ["#E8C8A0", "#D4B896"]
    accent: ["#C43A31", "#3B5998", "#6B8B5A", "#F5A623"]
    background: "#F5EDE0"
    text: "#2A1F14"
    muted: "#B8A890"
  composition: 平面化分层构图，人物侧脸入画，大面积装饰性色块压阵，和风纹样点缀
  texture: 木版拓印纹理，和纸纤维感，平面色块无透视，线条如刻刀般利落

style_lock:
  - "浮世绘风格"
  - "木版拓印纹理"
  - "平面化分层构图"
  - "和风纹样点缀"
  - "侧脸入画"
  - "刻刀般利落线条"
  - "和纸纤维底色"
  - "古雅配色"
  - "江户美学"

typography:
  headings:
    font: Noto Serif SC
    weight: 700
    line_height: 1.2
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#2A1F14"
    stroke: "#F5EDE0"
    stroke_width: 3
    band_color: "rgba(245, 237, 224, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: gentle-fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 7
    transition_duration_seconds: 0.6

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.6s"
  padding_color: "#F5EDE0"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "浮世绘风格, 木版拓印纹理, 平面化分层构图, 和风纹样点缀, 刻刀般利落线条, 和纸纤维底色, 古雅配色, 江户美学"
  image_negative_prompt: "photorealistic, 3D render, photograph, perspective, realistic shadow, gradient, 3D depth, western composition"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "画面必须有平面化无透视构图"
  - "色彩必须有木版拓印的扁平淡色"
  - "文字叠加不得遮挡角色面部表情"
