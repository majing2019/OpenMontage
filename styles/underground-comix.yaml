identity:
  name: "Underground Comix"
  category: comic
  mood: raw, transgressive, countercultural, gritty
  pace: fast
  best_for: "地下文化、反主流叙事、生猛表达、R.Crumb式讽刺、破格内容"

visual_language:
  color_palette:
    primary: ["#000000", "#1A1A1A"]
    accent: ["#000000"]
    background: "#F5EDD8"
    text: "#000000"
    muted: "#888888"
  composition: 密集的交叉排线和粗黑轮廓，夸张到怪诞的人物造型
  texture: 手工复印的黑白质感，密集排线的粗粝阴影，粗黑轮廓线加大量排线

style_lock:
  - "地下漫画风格"
  - "密集交叉排线"
  - "粗黑轮廓线"
  - "夸张怪诞造型"
  - "手工复印质感"
  - "粗粝黑白"
  - "R-Crumb式讽刺"
  - "反主流生猛"
  - "地下独立出版"

typography:
  headings:
    font: Noto Sans SC
    weight: 900
    line_height: 1.1
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.4
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#000000"
    stroke: "#F5EDD8"
    stroke_width: 3
    band_color: "rgba(245, 237, 216, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - cut
  animation_style: cut
  pacing_rules:
    min_scene_hold_seconds: 2
    max_scene_hold_seconds: 5
    transition_duration_seconds: 0.3

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.3s"
  padding_color: "#F5EDD8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "地下漫画风格, 密集交叉排线阴影, 粗黑轮廓线, 夸张怪诞造型, 手工复印黑白质感, R-Crumb式讽刺漫画, 反主流生猛"
  image_negative_prompt: "color, smooth, clean digital, polished, cute, elegant, photorealistic"
  consistency_anchors:
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有密集排线阴影"
  - "必须有粗黑轮廓线"
  - "文字叠加不得遮挡角色面部表情"
