identity:
  name: "Van Gogh Style"
  category: comic
  mood: passionate, intense, swirling, alive
  pace: moderate
  best_for: "燃烧的情感、星空下的独白、艺术家视角、热烈叙事、用生命画画"

visual_language:
  color_palette:
    primary: ["#1A3A5C", "#2A4A8C"]
    accent: ["#FFD700", "#FF8C00", "#C43A31", "#6B8B5A"]
    background: "#F0E8D0"
    text: "#1A2A3C"
    muted: "#A09880"
  composition: 一切都在旋转流动，星空是漩涡，麦田是波浪，每根线条都有生命的律动
  texture: 梵高式的漩涡厚涂笔触，短促跳动的色彩条纹，油彩在画布上堆积

style_lock:
  - "梵高后印象派风格"
  - "漩涡流动笔触"
  - "短促跳动色彩条纹"
  - "油彩厚涂堆积"
  - "星空漩涡感"
  - "燃烧的生命力"
  - "一切都在旋转"
  - "强烈情感表达"
  - "像梵高在画漫画"

typography:
  headings:
    font: Noto Sans SC
    weight: 700
    line_height: 1.2
  body:
    font: Noto Sans SC
    weight: 400
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#1A2A3C"
    stroke: "#F0E8D0"
    stroke_width: 3
    band_color: "rgba(240, 232, 208, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 8
    transition_duration_seconds: 0.6

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.6s"
  padding_color: "#F0E8D0"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "梵高后印象派风格, 漩涡流动笔触, 短促跳动的色彩条纹, 油彩厚涂堆积, 星空漩涡感, 燃烧的生命力, 一切都在旋转"
  image_negative_prompt: "photorealistic, smooth, flat, clean, digital, photorealistic, 3D render, calm, static"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "笔触必须漩涡流动式"
  - "必须有油彩厚涂堆积质感"
  - "文字叠加不得遮挡角色面部表情"
