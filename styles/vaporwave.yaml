identity:
  name: "Vaporwave"
  category: comic
  mood: surreal, consumerist-nostalgic, ironic, dreamy
  pace: slow
  best_for: "消费主义吐槽、互联网怀旧、蒸汽波梗、千禧年美学、超现实讽刺"

visual_language:
  color_palette:
    primary: ["#FF6B9D", "#00E5FF", "#B34CB3"]
    accent: ["#FFCC00", "#00FF88"]
    background: "#1A0033"
    text: "#FFCCFF"
    muted: "#663399"
  composition: 罗马石膏像混搭霓虹网格，Windows 95 对话框，棕榈树剪影，日文假名漂浮
  texture: 低保真VHS噪点，霓虹渐变色，早期互联网图形，文艺复兴雕塑混搭电子美学

style_lock:
  - "蒸汽波风格"
  - "罗马石膏像混搭"
  - "霓虹渐变色"
  - "Windows 95美学"
  - "棕榈树剪影"
  - "日文假名漂浮"
  - "低保真VHS噪点"
  - "千禧年互联网"
  - "消费主义超现实"

typography:
  headings:
    font: Noto Sans SC
    weight: 400
    line_height: 1.3
  body:
    font: Noto Sans SC
    weight: 300
    line_height: 1.5
  caption:
    font: "PingFang SC Regular"
    font_size: 34
    color: "#FFCCFF"
    stroke: "#1A0033"
    stroke_width: 3
    band_color: "rgba(26, 0, 51, 0.88)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方"

motion:
  transitions:
    - xfade_fade
  animation_style: dreamy-fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 7
    transition_duration_seconds: 0.6

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280"
  transition: "xfade=fade, duration=0.6s"
  padding_color: "#1A0033"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "蒸汽波风格, 罗马石膏像混搭, 霓虹渐变色, Windows 95复古美学, 棕榈树剪影, 日文假名漂浮, 低保真VHS噪点, 千禧年互联网"
  image_negative_prompt: "photorealistic, natural, modern, clean, minimal, daylight, traditional"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有画面必须包含 style_lock 关键词"
  - "必须有霓虹渐变色或罗马雕像混搭元素"
  - "必须有低保真或VHS质感"
  - "文字叠加不得遮挡角色面部表情"
