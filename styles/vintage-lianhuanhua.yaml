identity:
  name: "Vintage Lianhuanhua"
  category: comic
  mood: nostalgic, retro, storyteller, classic
  pace: moderate
  best_for: "怀旧故事、年代叙事、童年回忆、经典改编、父辈的故事"

visual_language:
  color_palette:
    primary: ["#2A1F14", "#3C2A1E"]
    accent: ["#8B4513", "#654321"]
    background: "#E8DCC8"
    text: "#2A1F14"
    muted: "#A89880"
  composition: 泛黄旧书页上钢笔速写，像翻出爸爸小时候的小人书，粗实线加单色调，画面下方有手写体说明文字的空间
  texture: 旧书页泛黄做旧，钢笔速写笔触，粗实线勾边，单色微黄像旧印刷品

style_lock:
  - "小人书连环画风格"
  - "泛黄旧书页底色"
  - "钢笔速写粗实线"
  - "单色做旧印刷"
  - "连环画分格"
  - "手写体文字空间"
  - "怀旧年代质感"
  - "简练生动造型"
  - "中国传统连环画"

typography:
  headings:
    font: Noto Serif SC
    weight: 700
    line_height: 1.2
  body:
    font: Noto Serif SC
    weight: 400
    line_height: 1.6
  caption:
    font: "PingFang SC Regular"
    font_size: 36
    color: "#2A1F14"
    stroke: "#E8DCC8"
    stroke_width: 3
    band_color: "rgba(232, 220, 200, 0.92)"
    band_side_padding: 20
    text_margin_x: 60
    position: "紧贴图片下方，无间隙"

motion:
  transitions:
    - xfade_fade
  animation_style: gentle-fade
  pacing_rules:
    min_scene_hold_seconds: 3
    max_scene_hold_seconds: 8
    transition_duration_seconds: 0.6

audio:
  voice_style: "none"
  music_mood: "none"
  music_volume: 0
  sfx_style: "none"

video_composition:
  target_resolution: "720×1280"
  fps: 30
  codec: "h264"
  layout: "1440×2560 原图 → 缩放到 720×1280 → 整体占满画布"
  transition: "xfade=fade, duration=0.6s"
  padding_color: "#E8DCC8"

asset_generation:
  image_resolution: "1440×2560"
  image_prompt_prefix: "小人书连环画风格, 泛黄旧书页底色, 钢笔速写粗实线, 单色做旧印刷, 连环画分格, 手写体文字空间, 怀旧年代质感, 简练生动造型, 中国传统连环画"
  image_negative_prompt: "color, colorful, digital art, anime, cartoon, 3D render, photograph, white background, clean modern, smooth digital"
  consistency_anchors:
    - "角色描述从 character_registry 逐字复用到每个 prompt"
    - "场景模板前缀从 scene_registry 逐字复用到每个 prompt"
    - "style_lock 关键词追加到每个 prompt 末尾"

quality_rules:
  - "所有角色在所有画面中必须使用完全相同的角色锚定描述"
  - "所有画面必须包含 style_lock 关键词"
  - "场景模板前缀在相同场景的所有画面中必须字面一致"
  - "文字叠加不得遮挡角色面部表情"
  - "画面内文字（scene_texts）≤5字用 ai_draw，>5字用 post_only"
  - "底色必须是泛黄旧书页色"
  - "线条必须是钢笔速写风格粗实线"
  - "色调必须单色做旧，不可彩色"
