# Story Factory — Emotion × Scene Matrix
#
# Pre-seeded story concepts for quick ideation.
# 8 emotions × 10 scenes × 2-3 seeds each = ~200 story starters.
#
# To add a new emotion: add it to the emotions list, then add seeds under matrix/<emotion>/.
# To add a new scene: add it to the scenes list, then add seeds under each emotion's <scene> key.
# To add a new seed: add it under its emotion/scene path with all 7 fields.
# To add daily observations: append to the daily_observations list.
#
# Fields per seed:
#   title           — short descriptive name
#   logline         — one-sentence story summary
#   hook            — opening line, must grab attention in 3 seconds
#   pattern_name    — must match a pattern name in tools/writing/_patterns.py
#   character_roles — list of character role names
#   twist_hint      — the reveal or reversal moment
#   visual_keywords — image-generation keywords for the scene
#
# This file is loaded by tools/writing/_emotion_matrix.py at runtime.

emotions:
- 惊讶
- 感动
- 好笑
- 紧张
- 温暖
- 心酸
- 愤怒
- 治愈
scenes:
- 办公室
- 家庭
- 地铁
- 便利店
- 医院
- 学校
- 餐厅
- 街头
- 电梯
- 公园
daily_observations:
- 上班路上买了一杯咖啡，到公司才发现没拿吸管
- 电梯里遇到领导，紧张地说了声'领导好'——然后发现自己走错了楼层
- 外卖小哥在楼下打电话'快到了快到了'——其实他还在三公里外
- 地铁站自动扶梯上，所有人的速度几乎一模一样
- 便利店里一个穿校服的高中生在认真挑选水果——是给生病的妈妈买的
- 午休时间办公室里此起彼伏的键盘声突然停了——有人打了个响嗝
- 楼下早餐店老板记得每个常客的口味——除了你，因为你不固定
- 加班到深夜发现，整个楼层只剩你一个人和自动贩卖机的灯
- 地铁上看到有人在背单词——不是学生，是头发花白的大叔
- 快递柜前的人都在低头取件，没有人抬头看旁边的人
- 早晨出门发现昨晚忘记关窗，窗帘在飘
- 出租车上司机突然说'你长得像我一个朋友'——然后沉默了一路
- 超市排队结账时，前面的人买了和你一模一样的零食
- 下雨天发现伞上有别人写的名字——是上一个落下伞的人
- 图书馆里有人翻书翻到一半睡着了，嘴角还有笑
- 健身房里，最认真锻炼的那个人，健身包上挂着一个儿童水壶
- 深夜回家的路上，路灯一盏一盏地亮起来——或者说你一盏一盏地经过
- 午休醒来以为还在上课，条件反射地举手——同事沉默了
- 小区门口保安每天说的'回来了'，有时候比'你好'更让人安心
- 手机相册翻到去年今天——同一棵树，叶子颜色不一样
- 雨天公交车窗上的水珠，折射出模糊的街道
- 洗衣房里一个人在叠衣服——叠得很认真，每件都抚平
- 公交车最后一排，一个女孩在哭，但表情是在笑
- 深夜出租车后座，看着窗外飞速倒退的街灯——这座城市从不睡觉
- 快递到了，是你自己上个月忘了退的东西又自动续费了
- 公司茶水间的微波炉'叮'了一声——整个上午最准时的事件
- 早晨挤地铁被踩了脚，想说'对不起'，对方先说了'对不起'
- 楼下水果摊老板总说'今天的橘子甜'——他每天都这么说
- 深夜把垃圾提下楼，发现同一时间还有邻居也在——交换了一个'你也这么晚'的笑
- 路上的流浪狗跟着你走了一段——然后拐弯去找它自己的路了
- 手机低电量时才想起昨天忘充电了
- 饭店里隔壁桌的人说的是你家乡的方言——突然想家了
- 下班的路上看到有人在遛一只很小很小的狗——小到像一只猫
- ATM机前排了队，每个人都在假装不看别人输入的密码
- 电梯到了你按的楼层——门开了但你不想出去
matrix:
  惊讶:
    办公室:
    - title: 新来的保洁阿姨
      logline: 公司新来的保洁阿姨总是知道所有人的秘密
      hook: 新来的保洁阿姨递给你一杯咖啡，用的恰好是你最爱的杯子
      pattern_name: 隐藏真相
      character_roles:
      - 新保洁阿姨
      - 普通员工
      twist_hint: 保洁阿姨其实是前任CEO的妈妈，来'看看儿子的事业'
      visual_keywords:
      - 办公区
      - 保洁推车
      - 咖啡杯
      - 监控画面
    - title: 神秘的共享文档
      logline: 一个没人创建的共享文档里写着所有人的心事
      hook: 周一打开共享文档，发现里面写着'如果你在看这条，说明你也睡不着'
      pattern_name: 隐藏真相
      character_roles:
      - 加班族
      - 匿名同事
      twist_hint: 文档创建者是即将离职的HR，把三年观察到的每个人写进去了
      visual_keywords:
      - 笔记本电脑屏幕
      - 凌晨办公室
      - 共享文档界面
      - 荧光灯
    家庭:
    - title: 爸爸的秘密抽屉
      logline: 整理爸爸遗物时发现一个抽屉，里面的东西完全超出想象
      hook: 爸爸去世后，妈妈说'那个抽屉你爸不让我碰'
      pattern_name: 隐藏真相
      character_roles:
      - 女儿
      - 去世的父亲
      - 母亲
      twist_hint: 抽屉里全是女儿从小到大的成绩单和奖状，每张背面都写着日期和一句话
      visual_keywords:
      - 旧木抽屉
      - 泛黄纸张
      - 老式台灯
      - 灰尘中阳光
    - title: 奶奶的闺蜜
      logline: 80岁的奶奶每周都要出门，家人以为她去跳广场舞
      hook: 奶奶每周三准时出门，换最漂亮的那件外套
      pattern_name: 身份反转
      character_roles:
      - 奶奶
      - 老闺蜜们
      twist_hint: 奶奶去的是养老院，陪一个没有家属的老人下棋
      visual_keywords:
      - 老式公寓
      - 花外套
      - 养老院活动室
      - 棋盘
    地铁:
    - title: 对面的人
      logline: 每天地铁对面的同一个人，突然有一天不见了
      hook: 每天早上8:15，对面座位的那个人总在看同一本书
      pattern_name: 陌生人温暖
      character_roles:
      - 通勤者
      - 对面座位的人
      twist_hint: 你找到了一张夹在座位缝隙里的书签——上面写着'希望你今天也顺利'
      visual_keywords:
      - 地铁车厢
      - 早高峰
      - 书籍
      - 车窗倒影
    - title: 反方向的地铁
      logline: 坐反方向的地铁，意外遇到了一个改变你一天的人
      hook: 慌乱中上了反方向的地铁，旁边的人说'别慌，这条线也会到的'
      pattern_name: 陌生人温暖
      character_roles:
      - 赶路的人
      - 陌生乘客
      twist_hint: 那个陌生人其实是和你同公司不同部门的同事，只是你从没注意过
      visual_keywords:
      - 地铁车厢
      - 反方向电子屏
      - 手扶栏杆
      - 换乘通道
    便利店:
    - title: 凌晨便利店的规矩
      logline: 家门口的24小时便利店有一条不成文的规矩
      hook: 凌晨3点的便利店，收银员递给你一杯热水说'坐会儿吧'
      pattern_name: 陌生人温暖
      character_roles:
      - 夜班收银员
      - 深夜顾客
      twist_hint: 收银员自己也在经历困难时期，帮助别人是他的自救方式
      visual_keywords:
      - 便利店
      - 深夜灯光
      - 热水杯
      - 货架
    医院:
    - title: 走廊尽头的人
      logline: 每次去医院都能看到走廊尽头坐着的同一个人
      hook: 医院走廊尽头的长椅上，总有一个人在看手机，表情平静
      pattern_name: 隐藏真相
      character_roles:
      - 病人
      - 走廊尽头的人
      twist_hint: 那个人是器官捐献者的家属，在等手术结果——捐给了走廊这头的病人
      visual_keywords:
      - 医院走廊
      - 长椅
      - 手机屏幕微光
      - 消毒灯
    学校:
    - title: 最后一排的同学
      logline: 全班最后排那个总睡觉的同学，毕业时做了件让所有人意外的事
      hook: 毕业典礼上，最后排的那个同学站起来发言了
      pattern_name: 身份反转
      character_roles:
      - 后排同学
      - 班主任
      - 全班同学
      twist_hint: 他不是在睡觉，是在翻译教材给听障的同桌
      visual_keywords:
      - 教室后排
      - 课本
      - 手语
      - 毕业典礼
    餐厅:
    - title: 对面的空座位
      logline: 一个人吃饭时，对面椅子突然被拉开
      hook: 一个人在餐厅吃饭，对面椅子突然被拉开——是服务员放错了
      pattern_name: 陌生人温暖
      character_roles:
      - 独自就餐的人
      - 服务员
      twist_hint: 服务员发现你已经连续一周一个人来了，特意每天假装弄错来陪你聊两句
      visual_keywords:
      - 餐厅桌面
      - 对面空椅
      - 服务员围裙
      - 窗外夜景
    街头:
    - title: 弹吉他的人
      logline: 地铁站出口那个弹吉他的人，弹的不是流行歌
      hook: 每天下班都听到一段旋律，但不是任何一首你认识的歌
      pattern_name: 日常英雄
      character_roles:
      - 路人
      - 街头艺人
      twist_hint: 那首歌是他写给走失的妹妹的，妹妹小时候最爱听他弹吉他
      visual_keywords:
      - 街头
      - 吉他盒
      - 路灯光圈
      - 零钱
    电梯:
    - title: 28楼的秘密
      logline: 公司电梯28楼从不停，但今天它停了
      hook: 你每天坐电梯到27楼，28楼按钮从没有人按过——直到今天
      pattern_name: 隐藏真相
      character_roles:
      - 好奇的员工
      - 28楼的人
      twist_hint: 28楼是一个给加班到深夜的员工准备的休息室，一直有人用，只是你不知道
      visual_keywords:
      - 电梯按钮面板
      - 28楼走廊
      - 深夜办公室
      - 秘密房间
    公园:
    - title: 长椅上的书
      logline: 公园长椅上同一本书连续出现三天
      hook: 第一天：长椅上一本没看完的书。第二天：翻到了新的页。第三天：夹了一张纸条
      pattern_name: 陌生人温暖
      character_roles:
      - 晨跑的人
      - 看书的人
      twist_hint: 纸条上写着'我也每天经过这里，希望你喜欢这本书'
      visual_keywords:
      - 公园长椅
      - 旧书
      - 晨光
      - 落叶
  感动:
    办公室:
    - title: 离职的抽屉
      logline: 同事离职后，你打开了他留下的抽屉
      hook: 老张退休了，走的时候只带走了一个水杯
      pattern_name: 日常英雄
      character_roles:
      - 老员工
      - 接替者
      twist_hint: 抽屉里按年份放着给每个新人的入职小纸条，最早的已经泛黄
      visual_keywords:
      - 办公桌抽屉
      - 泛黄纸条
      - 工位
      - 水杯
    家庭:
    - title: 冰箱上的贴纸
      logline: 妈妈在冰箱上贴满了便利贴，但不是写给你的
      hook: 回家发现冰箱上贴满了便利贴，每张都写着'热一下再吃'
      pattern_name: 亲情反转
      character_roles:
      - 在外工作的孩子
      - 妈妈
      twist_hint: 便利贴上的字迹越来越潦草——妈妈的手已经不太稳了
      visual_keywords:
      - 冰箱
      - 便利贴
      - 老年手
      - 厨房
    - title: 视频通话的背景
      logline: 每次和家里视频通话，背景都在同一个位置
      hook: 和爸妈视频，每次背景都是那面白墙
      pattern_name: 亲情反转
      character_roles:
      - 在外工作的孩子
      - 父母
      twist_hint: 白墙的那边是爸爸专门布置的'视频角'，背景后面堆满了杂物，他们只给你看干净的
      visual_keywords:
      - 手机视频画面
      - 白墙
      - 手机支架
      - 客厅
    地铁:
    - title: 让座的连锁反应
      logline: 一个人让座，引发了整节车厢的温暖连锁
      hook: 孕妇上车，一个年轻人站起来——然后坐下的人又站起来了
      pattern_name: 日常英雄
      character_roles:
      - 孕妇
      - 让座的年轻人
      - 连锁反应的乘客们
      twist_hint: 最终站起来的那个人是拄着拐杖的老大爷，他说'我下一站就到了'
      visual_keywords:
      - 地铁座位
      - 孕妇
      - 老人拐杖
      - 车厢灯光
    便利店:
    - title: 过期一天的面包
      logline: 便利店店员把过期一天的面包留给了特定的人
      hook: 每天深夜11:58，店员把当天剩余的面包装进袋子放在门口
      pattern_name: 日常英雄
      character_roles:
      - 便利店店员
      - 捡面包的人
      twist_hint: 捡面包的是个背着书包的高中生，妈妈生病了，他把节省下来的饭钱寄回了家
      visual_keywords:
      - 便利店门口
      - 面包袋
      - 深夜路灯
      - 高中生背影
    医院:
    - title: 5号床的画
      logline: 病房里5号床的人一直在画同一幅画
      hook: 住院一周，隔壁5号床每天画同一幅画——一扇窗户
      pattern_name: 日常英雄
      character_roles:
      - 病友
      - 5号床的画家
      twist_hint: 出院那天他把画送给了护士站——画里窗户打开着，窗外是他看到的每个照顾他的人
      visual_keywords:
      - 病房
      - 画板
      - 水彩颜料
      - 窗户
    学校:
    - title: 课桌里的纸条
      logline: 课桌抽屉里发现一张纸条，不是写给现在这个人的
      hook: 新学期换座位，课桌抽屉里有一张折了很久的纸条
      pattern_name: 时光对比
      character_roles:
      - 现任学生
      - 往届学生
      twist_hint: 纸条是三年前一个学生写给自己的鼓励，现在这个学生正好也需要这些话
      visual_keywords:
      - 课桌抽屉
      - 折纸条
      - 教室
      - 粉笔灰
    餐厅:
    - title: 最后一碗面
      logline: 面馆要关了，最后一碗面给了一个特殊的人
      hook: 老面馆最后一天营业，老板说'最后一碗不卖了'
      pattern_name: 日常英雄
      character_roles:
      - 面馆老板
      - 老顾客
      twist_hint: 他端到了隔壁桌那个独居老人面前，说'您吃，不收钱'
      visual_keywords:
      - 面馆
      - 最后一碗面
      - 老人
      - 卷帘门半关
    街头:
    - title: 雨伞共享
      logline: 暴雨天，一把伞在陌生人之间传递
      hook: 暴雨，一个陌生人把伞递给淋雨的小孩，自己跑进了雨里
      pattern_name: 陌生人温暖
      character_roles:
      - 陌生人
      - 小孩
      - 下一个接伞的人
      twist_hint: 伞在路人间传递了整整一条街，最后回到了第一个人的公司门口——同事接住了
      visual_keywords:
      - 暴雨街头
      - 伞
      - 奔跑的身影
      - 水洼倒影
    电梯:
    - title: 电梯里的故事
      logline: 电梯故障困了20分钟，里面的人从陌生变成了朋友
      hook: 电梯停在12楼和13楼之间，里面5个互相不认识的人
      pattern_name: 陌生人温暖
      character_roles:
      - 被困的5个陌生人
      twist_hint: 电梯修好后，5个人互相加了微信——现在是一个周末约饭的群
      visual_keywords:
      - 困住的电梯
      - 手机信号格
      - 5个陌生人
      - 应急灯
    公园:
    - title: 石凳上的刻字
      logline: 公园石凳上的刻字，记录了一段跨越几十年的故事
      hook: 石凳上有刻字：'老李，周六老地方见'
      pattern_name: 时光对比
      character_roles:
      - 石凳刻字者
      - 老李
      twist_hint: 旁边有新的刻字：'老李来了，但他等的人已经不在了。我替他坐了一会儿'
      visual_keywords:
      - 石凳
      - 刻字
      - 公园黄昏
      - 老树
  好笑:
    办公室:
    - title: 表情包灾难
      logline: 把老板的表情包发到了工作群，而且不是那个表情包
      hook: 老板发了个微笑表情，你回了个'好的老板'的搞笑表情包——发错了群
      pattern_name: 社死瞬间
      character_roles:
      - 员工
      - 老板
      - 同事们
      twist_hint: 老板回了一个更搞笑的，全场安静后突然爆笑
      visual_keywords:
      - 手机群聊
      - 尴尬表情
      - 工位
      - 老板办公室
    - title: 摸鱼翻车
      logline: 假装工作其实在摸鱼，关键时刻被现场直播
      hook: 开着摄像头开会，屏幕共享忘了关掉摸鱼的窗口
      pattern_name: 社死瞬间
      character_roles:
      - 摸鱼员工
      - 开会的领导
      - 同事
      twist_hint: 领导说'这个PPT不错'，然后发现你在看猫视频
      visual_keywords:
      - 电脑屏幕
      - 视频会议
      - 猫咪视频
      - 尴尬微笑
    家庭:
    - title: 家庭群名
