# Story Factory — Polarity Dimensions (Agent-Driven v3)
#
# Each dimension defines an ABSTRACT AXIS — a spectrum of human experience.
# No pre-written values. The agent generates specific pole_a, pole_b, and
# collision triggers at runtime based on the directional descriptions below.
#
# DESIGN PRINCIPLE:
#   pole_a_direction and pole_b_direction describe TWO ENDS OF THE SAME THING.
#   collision_mechanism describes HOW those two ends are forced into the same room.
#   cross_axis_hooks describe which OTHER dimensions create surprising fusions.
#
# This file is loaded by tools/writing/_polarity_engine.py at runtime.

dimensions:
  # ── 1. 消费行为 ────────────────────────────────────────────────
  - name: 消费行为
    name_en: Spending Attitude
    axis_description: >
      一个人对花钱的态度——从每一分钱都要算清楚，到完全不在乎价格。
      这是关于"值不值得"的本能判断，不是贫富，是姿态。
    pole_a_direction: >
      极端节俭的人。他们在菜市场讨价还价，在临期食品区徘徊，为一块钱的差距纠结再三。
      每一笔支出都是经过计算的。省钱不是手段，是一种肌肉记忆。
    pole_b_direction: >
      完全不在乎价格的人。不看标签、不比较、不退货。买完发现不合适就塞进柜子深处。
      花钱不是决策，是呼吸。他们甚至不觉得自己在"花钱"。
    collision_mechanism: >
      两种花钱态度在同一个消费场景里狭路相逢——同一排货架、同一张账单、同一条收银台队伍。
      谁都看不懂对方，但谁都不能走。
    cross_axis_hooks:
      - partner: 权力位差
        fusion: >
          当节俭的那个人恰好也是权力底端的人、不在乎价格的那个人恰好也是权力顶端的人，
          碰撞从"花钱态度不同"升级为阶级感。廉价场景里出现权力人物——或者反过来，
          权力场景里一个人的消费习惯暴露了他的出身。
      - partner: 亲疏折叠
        fusion: >
          你曾经和一个人一起买过最便宜的东西——那时候穷但亲密。现在你一个人买同样的东西，
          或者你看到他买了你曾经一起买过的东西，但旁边站着别人。消费行为成了亲疏变化的物证。
    emotions: [心酸, 好笑, 惊讶]
    patterns: [误会连环, 身份反转, 日常英雄]
    confidence: 5

  # ── 2. 社交自我 ────────────────────────────────────────────────
  - name: 社交自我
    name_en: Social Self
    axis_description: >
      同一个人在不同情境下的社交表现——从极度退缩到极度外放。
      这不是人格分裂，是同一个人在不同安全级别下的两张脸。
    pole_a_direction: >
      极度退缩的一面。聚餐坐角落、群里不说话、电话响了等它自己挂掉。
      不是不想交流，是在某些场合下开口的摩擦力大到了无法克服的程度。
    pole_b_direction: >
      极度外放的一面。维权电话打一个小时、直播能说两小时不停、在评论区逻辑严密地跟人吵一百楼。
      不是变了个人，是同一个人解除了某个开关。
    collision_mechanism: >
      有人在两个不同的场合分别看到了版本A和版本B。或者更狠的——两种状态被同时暴露了。
      你以为认识了ta，直到你撞见ta的另一面。
    cross_axis_hooks:
      - partner: 可见边界
        fusion: >
          社交自我的两张脸本质上是私密自我和公开自我的分裂。当可见边界被打破——
          比如私下的爆发被公开、或者公开场合下的退缩被看见——两张脸同时暴露在同一个画面里。
      - partner: 表达压强
        fusion: >
          长期沉默的人"社交自我"的退缩面恰好也是"表达压强"的压抑端。当表达压强突破临界值，
          社交自我的两张脸会在同一个瞬间翻转——从最安静的人变成最响的人。
    emotions: [惊讶, 好笑, 治愈]
    patterns: [身份反转, 奇葩逻辑, 隐藏真相]
    confidence: 5

  # ── 3. 权力位差 ────────────────────────────────────────────────
  - name: 权力位差
    name_en: Power Gap
    axis_description: >
      同一个组织或场景里的权力地位——从最没话语权的人到掌握一切的人。
      这不是能力差距，是"一句话能改变什么"的差距。
    pole_a_direction: >
      权力结构底端的人。实习生、外包、临时工、保洁阿姨——他们做的事最具体，但他们的存在最容易被忽视。
      他们的名字不一定会出现在会议纪要里，但他们的工作被所有人使用。
    pole_b_direction: >
      权力结构顶端的人。创始人、一号位、决定预算和编制的那个人。
      他们不一定会做具体的事，但他们的一句话能改变所有正在做具体事的人的命运。
    collision_mechanism: >
      两端被迫进入同一个封闭空间——电梯、消防演习角落、年会抽签配对、同一个航班邻座。
      不能走，不能装没看见。空间太小，权力差被压缩到了无法忽略的距离。
    cross_axis_hooks:
      - partner: 消费行为
        fusion: >
          权力顶端的人出现在权力底端的人日常消费的场景里——比如老板出现在员工常去的廉价餐厅。
          或者反过来，底层的人被拉进了顶层的消费场景——比如实习生被叫去陪客户去他从未进过的餐厅。
          消费场景成了权力差的放大镜。
      - partner: 表达压强
        fusion: >
          权力底端的人同时也是"表达压强"里最沉默的人。当他在权力顶端的人面前突然不再沉默——
          拍桌子、提离职、说出了所有人都不敢说的话——权力差在这一刻被短暂地反转了。
    emotions: [紧张, 心酸, 惊讶]
    patterns: [瞬间决定, 隐藏真相, 身份反转]
    confidence: 5

  # ── 4. 亲疏折叠 ────────────────────────────────────────────────
  - name: 亲疏折叠
    name_en: Intimacy Fold
    axis_description: >
      同一段关系中的亲密程度——从曾经最近的人变成了现在最远的人。
      这不是两个不同的人，是同一段关系在两个时间点的状态折叠在一起。
    pole_a_direction: >
      曾经的亲密。知道彼此所有食物过敏、共用音乐账号、每月通话时长排第一、手机里存着对方的指纹。
      那些细节不是刻意记住的——是曾经的生活里本身就充满了对方。
    pole_b_direction: >
      现在的陌生。朋友圈一条横线、共同好友合照里出现了不认识的人、擦肩而过双方都认出了对方但都没有停。
      不是绝交，是生活轨道分岔到了不再相交的方向。
    collision_mechanism: >
      一个物件、一条推送、一个地点——把两个时间层同时激活了。
      你正在过着"现在"的生活，却被一个细节猛地拽回了"曾经"。
    cross_axis_hooks:
      - partner: 空间叠层
        fusion: >
          亲密关系留下的物证恰好也是空间叠层里的"前任痕迹"——冰箱上的便利贴、工位抽屉里的纸条。
          亲疏变化被物理空间忠实地保存了下来。你搬走了，但东西还在。
      - partner: 时间差
        fusion: >
          亲密关系的断裂时刻和当下收到"迟到信息"的时刻——两个时间点同时击中了你。
          亲疏折叠是关系的变化，时间差是信息到达的延迟。两者叠加：迟到的信息恰好是关于那个已经变远的人。
    emotions: [心酸, 感动, 治愈]
    patterns: [时光对比, 亲情反转, 如果当初]
    confidence: 5

  # ── 5. 时间差 ────────────────────────────────────────────────
  - name: 时间差
    name_en: Time Lag
    axis_description: >
      同一件事的"应该到达的时刻"和"实际到达的时刻"之间的裂缝。
      不是遗忘，是延迟。信息、物品、理解——它们在路上走了太久，到达的时候接收端已经变了。
    pole_a_direction: >
      应该在那个时刻发生的。三年前发出去但发送失败的消息、十八岁生日那年说好要给的礼物、
      离职那天老板说"改天请你吃饭"——当时没当真。
    pole_b_direction: >
      现在才发生的。今天手机弹出一条延迟推送、快递到了但寄件日期是三年前、
      你在新工位抽屉里看到上一任留下的纸条。你终于听懂了那句话——不是突然开窍，是你经历了同样的事。
    collision_mechanism: >
      一条迟到的消息和一条刚发出的消息同时出现在通知栏。一件旧物在你当下的生活场景里被翻出来。
      当时和现在被压缩进了同一个画面。
    cross_axis_hooks:
      - partner: 亲疏折叠
        fusion: >
          迟到的信息恰好关于一个已经变远的人。时间差延迟了信息的到达，亲疏折叠标记了关系的变质。
          当你收到消息的时候，发送者和接收者都不再是原来的那个人了。
      - partner: 预期塌方
        fusion: >
          你期待的事没有在当时发生（预期塌方），而关于那件事的确认在很久以后才到达（时间差）。
          两个裂缝叠加：当时的落空 + 现在的迟到确认。
    emotions: [感动, 心酸, 惊讶]
    patterns: [时光对比, 如果当初, 日常英雄]
    confidence: 4

  # ── 6. 可见边界 ────────────────────────────────────────────────
  - name: 可见边界
    name_en: Visibility Boundary
    axis_description: >
      同一段信息的可见范围——从"只有自己知道"到"所有人都在看"。
      边界不是被跨越的，是被撞破的。
    pole_a_direction: >
      完全私密的内容。备忘录里写了一年多的日记、深夜两点仅自己可见的朋友圈、搜索记录里埋在最下面的一条、
      草稿箱里躺了半年的辞职信。这些东西被创造的时候就没打算让第二个人看到。
    pole_b_direction: >
      完全公开的场景。会议室投屏全组二十个人盯着你的桌面、年会大屏幕、客户让你现场打开一个文件、
      领导在全员大会上提到你从未发给过他的东西。
    collision_mechanism: >
      投屏线插上的那一刻弹出了消息预览。同事借你电脑，下拉搜索框里弹出了你的搜索历史。
      你点开文件准备演示——封面图加载成了隐藏相册里的照片。边界不是被推倒的，是崩裂的。
    cross_axis_hooks:
      - partner: 社交自我
        fusion: >
          私密内容暴露出来的恰好是社交自我的另一张脸——那个在公开场合沉默的人，
          私下的备忘录里写了三千字、在不敢发出去的朋友圈里骂了所有人。
          可见边界的破裂同时撕开了社交自我的两张脸。
      - partner: 表达压强
        fusion: >
          长期压抑的人把想说的话都存在了私密的地方——备忘录、日记、仅自己可见的朋友圈。
          当可见边界被撞破，这些"本该只有自己看到的话"变成了公开的爆发。
          不是他主动选择的爆发——是边界替他爆的。
    emotions: [好笑, 紧张, 心酸]
    patterns: [社死瞬间, 误会连环, 奇葩逻辑]
    confidence: 5

  # ── 7. 付出天平 ────────────────────────────────────────────────
  - name: 付出天平
    name_en: Giving Balance
    axis_description: >
      一段关系中的付出方向——从持续单向给予，到第一次需要被接住。
      这不是慷慨变自私，是天平两端站的是同一个人，但方向反了。
    pole_a_direction: >
      长期、稳定的、无人注意的给予者。每次聚餐留下来买单算人均、朋友搬家永远第一个到、
      每个同事的生日都记得、群里有人求助永远第一个回"我来"。他们的付出已经成了所有人的默认设置。
    pole_b_direction: >
      第一次需要被接住的时刻。发了一条消息"有人能帮我吗"——等了很久没人回。
      请了一天病假——第二天来的时候工位上连杯水都没有。第一次跟人说"我不太行"——
      对方愣了一下说"你是在开玩笑吧"。
    collision_mechanism: >
      给予者站到了天平的另一端——他需要开口求助了，嘴张了三次。
      而那个他曾经帮过的人，正好站在他面前。
    cross_axis_hooks:
      - partner: 表达压强
        fusion: >
          给予者的沉默（从不抱怨、从不拒绝、从不说"我不行"）恰好也是"表达压强"的压抑端。
          当他终于说了一句"我需要帮助"——这是付出天平的反转，也是表达压强的释放。
          两种突破发生在同一个瞬间。
      - partner: 权力位差
        fusion: >
          当给予者恰好也是权力底端的人——比如永远帮所有人跑腿的实习生——他第一次拒绝或第一次求助时，
          付出天平的反转同时撼动了权力结构。别人不是因为他在求助而惊讶，是因为"他"在求助而惊讶。
    emotions: [心酸, 感动, 温暖]
    patterns: [日常英雄, 亲情反转, 陌生人温暖]
    confidence: 4

  # ── 8. 表达压强 ────────────────────────────────────────────────
  - name: 表达压强
    name_en: Expression Pressure
    axis_description: >
      同一个人表达强度的两个极端——从完全不表达，到一次性全部释放。
      不是脾气变了，是压强到了临界值。
    pole_a_direction: >
      长期压抑。三年没跟任何人说过"我累了"、每次都说"都行"、开会永远坐角落不说话、
      朋友圈三年只有一张风景照。不是没有情绪，是表达的行为本身比压抑更费力。
    pole_b_direction: >
      一次性释放。拍桌子说了一句所有人安静了、在群里发了五千字、当场提了离职收拾东西用了十分钟、
      把所有人都拉黑了——不是生气，是终于不害怕一个人了。
    collision_mechanism: >
      释放发生的那一刻——全场安静了五秒，然后有人开始鼓掌，有人开始低头看手机。
      第二天他照常来上班，所有人都知道昨天发生了什么，没人敢提。
      但他倒水的姿势不一样了。
    cross_axis_hooks:
      - partner: 权力位差
        fusion: >
          最沉默的那个人恰好也是权力底端的那个人。当他爆发时，打破的不只是自己的沉默——
          是权力结构里"底层人不该发声"的默契。一句话同时击穿了表达压强和权力位差。
      - partner: 付出天平
        fusion: >
          长期给予者从来不抱怨——他的沉默同时是付出天平的常态和表达压强的压抑。
          当他终于说了一句"我不干了"或"你能帮帮我吗"，两个维度同时反转。
    emotions: [惊讶, 感动, 愤怒]
    patterns: [瞬间决定, 隐藏真相, 身份反转]
    confidence: 5

  # ── 9. 空间叠层 ────────────────────────────────────────────────
  - name: 空间叠层
    name_en: Space Overlay
    axis_description: >
      同一个物理空间里两个时间层的占有痕迹——过去的人留下的，和现在的人正在用的。
      两个时间层在同一平方米里共存，互不相识。
    pole_a_direction: >
      前任占有者的痕迹。冰箱门上贴着上一个住客的便利贴、工位抽屉最深处有一张不是留给你的纸条、
      衣柜顶上的落灰盒子房东说可能是上一个人的。这些痕迹没有主人，但也没有消失。
    pole_b_direction: >
      现任占有者的现实。你买的新杯子刚好挡住了上一个杯子留下的印子、你睡在这个房间的第二年、
      你换了一份新工作——同事偶尔会不小心叫成上一任的名字。你在用着这个空间，但空间还记得别人。
    collision_mechanism: >
      两个时间层突然重叠了。房东说"之前那个人回来拿东西"。新同事凑过来看了一眼你的工位抽屉，
      愣了一下说"这个还在啊"。一个不属于你的东西出现在你的空间里——但你知道它对某个人很重要。
    cross_axis_hooks:
      - partner: 亲疏折叠
        fusion: >
          空间里留下的上一个人的痕迹，恰好也是"亲疏折叠"里那个变远的人留下的。
          你在冰箱上看到他写的便利贴——你们已经不联系了，但他的字还在你的厨房里。
          空间叠层是物理的，亲疏折叠是情感的。同一张便利贴同时击中两者。
      - partner: 时间差
        fusion: >
          前任留下的东西在你搬进来很久之后才被你发现（时间差），而发现的时候
          你已经在这个空间里建立了自己的痕迹（空间叠层）。两个时间维度同时作用在同一平方米上。
    emotions: [心酸, 治愈, 惊讶]
    patterns: [时光对比, 隐藏真相, 陌生人温暖]
    confidence: 4

  # ── 10. 预期塌方 ────────────────────────────────────────────────
  - name: 预期塌方
    name_en: Expectation Collapse
    axis_description: >
      同一件事的"你以为会发生的版本"和"实际发生的版本"之间的裂缝。
      不是失望，是塌方。整个未来的形状在一条消息、一通电话、一扇关着的门面前塌掉了。
    pole_a_direction: >
      长期准备的、仔细构建的预期。为升职准备了半年甚至一年、攒了五年首付看了三年户型图、
      为演出练了三年的琴、终于约到了等了两年的人。你为那个版本的生活做了所有你能做的准备。
    pole_b_direction: >
      实际发生的版本。升职答辩前一天职位被取消了、开盘当天小区贴了停工通知、
      演出前一天接到电话说取消了理由是"档期冲突"、她说"好"之后第三天取消了说"太忙了"。
      没有大灾难，只有一扇关上的门。
    collision_mechanism: >
      你站在那扇门前——门上贴着通知，墨还没干。你的手机备忘录里还有那个日期倒计时。
      所有人看你的眼神都变了——你不知道他们已经知道了，你还在按原来的剧本走。
      那天晚上你一个人坐在车里，引擎没关，只是在等一首歌放完。
    cross_axis_hooks:
      - partner: 时间差
        fusion: >
          预期的塌方发生在当时，而关于"为什么塌"的真相在很久以后才到达。
          或者反过来——你一直不知道那件事塌了，直到今天才收到消息。预期塌方和时间差同时作用，
          裂缝被拉得更长。
      - partner: 表达压强
        fusion: >
