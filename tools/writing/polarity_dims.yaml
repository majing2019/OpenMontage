# Story Factory — Polarity Dimensions
#
# Each dimension defines a spectrum of everyday extremes.
# The polarity engine picks two poles from one dimension and collides them
# via a collision trigger to produce one-liner stories.
#
# To add a dimension: add a new entry and the engine will discover it.
# To tune a dimension: edit pole values, collision triggers, or confidence score.
#
# Rules:
#   - pole_a and pole_b must be OPPOSITE ends of the same spectrum
#   - pole values should be SPECIFIC (use real numbers, names, behaviors, not adjectives)
#   - confidence: 1-5, higher = more reliably produces good one-liner stories
#   - collision_triggers: how the two poles are forced to intersect
#
# This file is loaded by tools/writing/_polarity_engine.py at runtime.

dimensions:
  # ── 1. 消费层级 ────────────────────────────────────────────────
  - name: 消费层级
    name_en: Consumption Level
    description: 经济消费行为中的层级落差。极低端的消费场景撞上极高端的人物。
    confidence: 5
    pole_a:
      values:
        - "39元/位的自助餐"
        - "泡面，第三天了"
        - "拼多多上买的最便宜的东西"
        - "超市晚上八点的打折区"
        - "共享单车月卡续费犹豫了三天"
        - "临期食品打折区，只剩最后一份"
    pole_b:
      values:
        - "老板"
        - "甲方"
        - "总监"
        - "投资人"
        - "丈母娘"
        - "前女友的现男友"
    collision_triggers:
      - "拼桌"
      - "排在你前面"
      - "同一个优惠区"
      - "帮你结了账"

  # ── 2. 社交能量 ────────────────────────────────────────────
  - name: 社交能量
    name_en: Social Energy
    description: 一个人在社交中的行为倾向——极度回避还是极度主动。
    confidence: 5
    pole_a:
      values:
        - "社恐，一个人坐角落吃饭"
        - "聚会全程低头看手机"
        - "从不在群里说话"
        - "不敢接电话，让它响了三次才接"
        - "跟别人对视会先移开眼"
        - "面试时声音小到面试官说'再大点'"
    pole_b:
      values:
        - "网络喷子，评论区手速飞快"
        - "酒桌上主动给所有人敬酒"
        - "陌生人搭讪毫不费力"
        - "在群里连发十条消息带表情包"
        - "直播时一个人能说两小时不停"
        - "维权时条理清晰把对方骂到退群"
    collision_triggers:
      - "你发现她的键盘声在凌晨两点还响"
      - "有人私信问她是不是认识"
      - "你看到她私信里全是骂人的话"
      - "她本人出现在你面前时比谁都安静"

  # ── 3. 身份层级 ──────────────────────────────────────────
  - name: 身份层级
    name_en: Identity Hierarchy
    description: 组织中的正式身份层级落差。最低层级的人出现在最高层级的场景中。
    confidence: 4
    pole_a:
      values:
        - "实习生"
        - "外包公司派来的"
        - "临时工"
        - "第一天入职"
        - "保洁阿姨"
        - "实习生被叫去陪客户吃饭"
    pole_b:
      values:
        - "CEO"
        - "大老板"
        - "甲方一号位"
        - "决定你转正的那个人"
        - "公司所有客户都在的那桌"
    collision_triggers:
      - "你被安排坐在主桌旁边倒茶"
      - "电梯里只有你和他，他突然跟你说话了"
      - "他问了一个你只有新人知道的事"
      - "他直接叫了你的名字——你知道他不应该认识你"

  # ── 4. 情感距离 ──────────────────────────────────────
  - name: 情感距离
    name_en: Emotional Distance
    description: 人与人之间的情感亲疏。最远的距离有时候不是陌生人——而是曾经最近的人。
    confidence: 5
    pole_a:
      values:
        - "陌生人"
        - "五年没联系的同学"
        - "去世的朋友"
        - "你存了聊天记录但从没打过的号码"
        - "搬走后再也没联系过的邻居"
        - "朋友圈仅三天可见但什么都看不到"
    pole_b:
      values:
        - "前男友"
        - "去世三年的朋友"
        - "小时候最好的朋友"
        - "曾经每天聊天到凌晨的人"
        - "你假装已经忘了但半夜还在看主页的人"
    collision_triggers:
      - "货架上出现了她曾经最爱的饮料"
      - "他的手机来电显示——存着你的旧号码"
      - "你收到了一条迟了三年的生日提醒"
      - "在新的合照里，你看到了他曾经戴过的手表"

  # ── 5. 时间 ─────────────────────────────────────────────
  - name: 时间
    name_en: Time
    description: 同一件事/同一种关系在不同时间点的落差。时间本身就是冲突源。
    confidence: 5
    pole_a:
      values:
        - "三年前"
        - "小时候"
        - "上一次见面"
        - "去年这时候"
        - "搬走那天的冰箱还贴着你的留言"
        - "最后一次吵架说的那句话"
    pole_b:
      values:
        - "现在"
        - "今天"
        - "刚才"
        - "突然收到一条消息"
        - "他去世后的第三年"
        - "你才发现那件事的结果"
    collision_triggers:
      - "你今天收到了一个迟到的快递——寄件是三年前的"
      - "打开抽屉看到一张那天的超市小票"
      - "你突然想起来那句话是什么意思"

  # ── 6. 公开/私密 ──────────────────────────────────────
  - name: 公开/私密
    name_en: Public/Private
    description: 本应只有自己知道的事被意外公开，或者本应公开的事只有自己知道。
    confidence: 5
    pole_a:
      values:
        - "手机屏幕"
        - "浏览器搜索记录"
        - "抽屉里的东西"
        - "日记本"
        - "备忘录 app"
        - "深夜两点发的朋友圈（仅自己可见）"
    pole_b:
      values:
        - "公司大屏投屏"
        - "公司群（全员可见）"
        - "会议投屏"
        - "年会上被公开念出来"
        - "你不在场时的聚餐合照"
    collision_triggers:
      - "轮到你做 demo 时，PPT 里夹带了你的浏览器书签"
      - "年会上你的加班时长被做成了图表"
      - "你发现搜索记录里有一条是凌晨四点的"

  # ── 7. 给予/索取 ──────────────────────────────────────
  - name: 给予/索取
    name_en: Give/Take
    description: 在一段关系中，一个人一直在付出/给予，另一个人一直在接受/索取。方向突然反转。
    confidence: 4
    pole_a:
      values:
        - "每天早上第一个到公司，帮所有人开空调"
        - "三年每天给你带早餐，风雨无阻"
        - "聚会时永远负责点单、收尾、结账"
        - "别人的事永远帮忙，自己的事从不麻烦人"
        - "过年给每个同事准备了礼物"
    pole_b:
      values:
        - "第一次开口请求别人帮忙"
        - "辞职那天在群里发了一句'谢谢大家照顾'"
        - "第一次让别人知道自己其实也需要人陪"
        - "搬家那天没跟任何人说"
        - "临走前你问'有人能来帮我搬一下吗'，群里没人回复"
    collision_triggers:
      - "你提出辞职的当天，收到公司群被解散的消息"
      - "搬家那天你一个人扛着箱子下楼，没叫任何人——但楼道里每一扇门都开着一条缝"
      - "你终于发了一条朋友圈——半小时内你的电话响了三次"

  # ── 8. 沉默/爆发 ──────────────────────────────────────
  - name: 沉默/爆发
    name_en: Silence/Outburst
    description: 一个人长期处于沉默/顺从状态，突然爆发——说出或做出所有人意想不到的事。
    confidence: 5
    pole_a:
      values:
        - "三年没跟家人说过一句'我累了'"
        - "每次被问到意见就说'都行'"
        - "开会永远只坐角落不说话"
        - "二十年没跟任何人吵过架"
        - "被所有人评价'性格很好'但没人在乎他想什么"
        - "微信三年朋友圈只有一张风景照"
    pole_b:
      values:
        - "拍桌子说了一句，所有人安静了"
        - "一封邮件发给了全公司"
        - "当场提了离职，当天就走了"
        - "在家族群里发了一段五千字的长文"
        - "说了所有人都不敢说但都想说的那句话"
    collision_triggers:
      - "你亲眼看到的——没人反应过来，以为是幻听"
      - "他平静地回来坐下，好像什么都没发生——但你注意到他的手在抖"
      - "第二天他照常来上班，但所有人看他的眼神都变了"

  # ── 9. 地盘/领地 ─────────────────────────────────────
  - name: 地盘/领地
    name_en: Territory
    description: 一个空间/关系本应属于现在的人，但上一个人的痕迹或权利还在。
    confidence: 4
    pole_a:
      values:
        - "前女友家"
        - "上一任租客留下的东西"
        - "新办公室的前任工位的盆栽"
        - "同事的抽屉里"
        - "租房时房东留的物品"
        - "车库里前车主留下的工具"
    pole_b:
      values:
        - "你自己的痕迹出现在别人那里"
        - "你的照片还贴在墙上"
        - "你送的杯子还在用着"
        - "你写的便利贴还在冰箱上"
        - "你的位置已经被别人坐了"
    collision_triggers:
      - "打开柜子看到前女友冰箱里放着你送的杯子——说明她没有扔掉"
      - "新来的实习生用着你留下的杯子喝水"
      - "退租时发现房东把你贴的挂钩全拆了，但冰箱门的贴纸还在"

  # ── 10. 期待/落差 ──────────────────────────────────────
  - name: 期待/落差
    name_en: Expectation/Fall
    description: 对一件事准备了很久、投入很深、以为会朝着某个方向发展——然后一个意外让它转向。
    confidence: 4
    pole_a:
      values:
        - "准备了半年的升职演讲"
        - "攒了十年的婚房贷款"
        - "每年都约的那个人今年终于答应了"
        - "练了三年的乐器，演出那天"
        - "每天早上6点起床坚持了十年"
    pole_b:
      values:
        - "那个职位被裁了"
        - "拿到钥匙当天小区贴了违建通知"
        - "答应的那天她取消了你——说是'太忙了'"
        - "演出当天主办方说他不能上台了——没有理由"
        - "今天闹钟响了，他关了。什么都没说。也没去上班"
    collision_triggers:
      - "你什么都没说，继续上班——但所有人看你眼神都不一样了"
      - "一觉醒来，手机里有一条通知——不是梦里的那种通知"
      - "他像什么都没发生一样吃着早餐——但桌上多了一张纸条"
